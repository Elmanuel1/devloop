spring:
  datasource:
    # These will be overridden by @DynamicPropertySource in BaseRepositoryTest
    url: jdbc:postgresql://localhost:5432/testdb
    username: test
    password: test
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: ["classpath:/"]
    baseline-on-migrate: true
    clean-disabled: false
    validate-on-migrate: true

  threads:
    virtual:
      enabled: true

  jpa:
    hibernate:
      ddl-auto: none  # We use Flyway for schema management
    show-sql: false
    open-in-view: false

  jackson:
    time-zone: UTC
    serialization:
      write-dates-as-timestamps: false
        
server:
  timezone: UTC
  port: 8080

# AWS Configuration for tests (use mock/test values)
aws:
  credentials:
    access-key: ${AWS_ACCESS_KEY_ID:test-access-key}
    secret-key: ${AWS_SECRET_ACCESS_KEY:test-secret-key}
  bucket:
    region: ${AWS_REGION:us-east-1}
    name: ${AWS_S3_BUCKET_NAME:test-bucket}
    endpoint: ${AWS_S3_ENDPOINT:} # Optional: Custom S3-compatible endpoint for tests
    public-read: false
    max-file-size-bytes: 26214400 # 25MB

logging:
  level:
    com.tosspaper.emailengine: DEBUG
    org.jooq: DEBUG
    org.springframework.jdbc: DEBUG
    org.flywaydb: DEBUG
