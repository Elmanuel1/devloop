openapi: 3.1.0
servers:
  - url: http://localhost:8080
    description: Development server
  - url: http://localhost:8080
    description: Local development server
info:
  title: Purchase Order System API
  version: v1
  description: REST API for creating resources in the Purchase Order System.
  contact:
    name: Acme Corp
    url: https://localhost:8080

components:
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Generic Error
    ErrorResponse:
      type: object
      properties:
        code:
          type: string
          example: "Acme Analytics Platform"
        message:
          type: string
          example: "An error occurred while processing your request"

    # Sender Approval Request
    ApproveSenderRequest:
      type: object
      required:
        - senderIdentifier
        - approvalStatus
      properties:
        senderIdentifier:
          type: string
          description: Email address (e.g., "user@example.com") or domain (e.g., "example.com") to approve/reject
          example: "supplier@acme.com"
        approvalStatus:
          type: string
          enum: [approved, rejected]
          description: |
            - approved: Approve sender and trigger extraction for all their attachments
            - rejected: Reject sender and soft-delete all their threads (scheduled for permanent deletion after grace period)

    # Extraction Review Request
    ReviewExtractionRequest:
      type: object
      required:
        - approved
      properties:
        approved:
          type: boolean
          description: |
            - true: Approve the match and create document with provided documentData
            - false: Reject the match (no document created)
          example: true
        notes:
          type: string
          description: Optional notes explaining the approval or rejection decision
          example: "Verified PO number matches invoice. Proceeding with processing."
        documentData:
          type: object
          nullable: true
          description: |
            Document data matching extraction.json schema structure.
            Required when approved=true. Contains the extraction result data (potentially modified by user)
            that will be used to create the Invoice/DeliverySlip/DeliveryNote record.
            Should match the structure from extraction.json schema.
          additionalProperties: true

    # Company
    CompanyBase:
      type: object
      properties:
        description:
          type: string
          nullable: true
          description: Short description
          example: "Leading provider of road-runner-proof products."
        logoUrl:
          type: string
          format: url
          nullable: true
          description: URL to the company logo
          example: "https://cdn.yourdomain.com/logos/company-42/logo-abc123.png"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        termsUrl:
          type: string
          format: url
          nullable: true
          description: Link to terms and conditions
          example: "https://acme.com/terms"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        privacyUrl:
          type: string
          format: url
          nullable: true
          description: Link to privacy policy
          example: "https://acme.com/privacy"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        metadata:
          type: object
          nullable: true
          description: Additional metadata for the company (e.g., compliance information, configuration)

    CompanyCreate:
      type: object
      required:
        - name
        - assignedEmail
      properties:
        name:
          type: string
          description: Name of the company
          example: "Acme Corporation"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotBlank"
        description:
          type: string
          nullable: true
          description: Short description
          example: "Leading provider of road-runner-proof products."
        assignedEmail:
          type: string
          format: email
          description: Email selected for use by tosspaper for this company it has to be unique and not already assigned to another company
          example: "controla@useassetiq.com"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidAssignedEmailDomain"
        logoUrl:
          type: string
          format: url
          nullable: true
          description: URL to the company logo
          example: "https://cdn.yourdomain.com/logos/company-42/logo-abc123.png"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        termsUrl:
          type: string
          format: url
          nullable: true
          description: Link to terms and conditions
          example: "https://acme.com/terms"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        privacyUrl:
          type: string
          format: url
          nullable: true
          description: Link to privacy policy
          example: "https://acme.com/privacy"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        metadata:
          type: object
          nullable: true
          description: Additional metadata for the company (e.g., compliance information, configuration)
          example: {"compliance": {"province": "BC", "rules": ["DEPOSIT_SECURITY", "DEPOSIT_PET_DAMAGE"]}}
        countryOfIncorporation:
          type: string
          nullable: true
          description: "ISO 3166-1 alpha-2 country code (e.g., US, CA, GB) indicating where the company is incorporated. Used to determine default currency."
          example: "US"
          maxLength: 2
          minLength: 2

    CompanyInfoUpdate:
      type: object
      x-class-extra-annotation: "@com.tosspaper.common.validator.AtLeastOneNotNull"
      properties:
        description:
          type: string
          nullable: true
          description: Short description
          example: "Leading provider of road-runner-proof products."
        assignedEmail:
          type: string
          format: email
          nullable: true
          description: Email selected for use   it has to be unique and not already assigned to another company
          example: "manager@useassetiq.com"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidAssignedEmailDomain"
        logoUrl:
          type: string
          format: url
          nullable: true
          description: URL to the company logo
          example: "https://cdn.yourdomain.com/logos/company-42/logo-abc123.png"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        termsUrl:
          type: string
          format: url
          nullable: true
          description: Link to terms and conditions
          example: "https://acme.com/terms"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        privacyUrl:
          type: string
          format: url
          nullable: true
          description: Link to privacy policy
          example: "https://acme.com/privacy"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        name:
          type: string
          nullable: true
          description: Name of the company
          example: "Acme Corporation Updated"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.Size(min=1, message=\"Name cannot be empty if provided\")"
        countryOfIncorporation:
          type: string
          nullable: true
          description: "ISO 3166-1 alpha-2 country code (e.g., US, CA, GB) indicating where the company is incorporated. Used to determine default currency."
          example: "US"
          maxLength: 2
          minLength: 2
        currency:
          type: string
          nullable: true
          description: "ISO 4217 currency code (e.g., USD, CAD, EUR)"
          example: "USD"
        multicurrencyEnabled:
          type: boolean
          nullable: true
          description: "Whether multicurrency is enabled for this company"
          example: false
    Company:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: Unique identifier for the company
          example: 123456789
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
          example: "2025-06-03T02:48:43Z"
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
          example: "2025-06-03T02:48:43Z"
        name:
          type: string
          description: Name of the company
          example: "Acme Corporation"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotBlank"
        email:
          type: string
          format: email
          description: Contact email for the company
          example:
        assignedEmail:
          type: string
          format: email
          description: Email of the assigned account manager or contact (must be @useassetiq.com)
          example: "controla@useassetiq.com"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidAssignedEmailDomain"
        description:
          type: string
          nullable: true
          description: Short description
          example: "Leading provider of road-runner-proof products."
        logoUrl:
          type: string
          format: url
          nullable: true
          description: URL to the company logo
          example: "https://cdn.yourdomain.com/logos/company-42/logo-abc123.png"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        termsUrl:
          type: string
          format: url
          nullable: true
          description: Link to terms and conditions
          example: "https://acme.com/terms"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        privacyUrl:
          type: string
          format: url
          nullable: true
          description: Link to privacy policy
          example: "https://acme.com/privacy"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidUrl"
        currency:
          type: string
          nullable: true
          description: "ISO 4217 currency code (e.g., USD, CAD, EUR)"
          example: "USD"
        multicurrencyEnabled:
          type: boolean
          nullable: true
          description: "Whether multicurrency is enabled for this company"
          example: false
        countryOfIncorporation:
          type: string
          nullable: true
          description: "ISO 3166-1 alpha-2 country code (e.g., US, CA, GB) indicating where the company is incorporated. Used to determine default currency."
          example: "US"
          maxLength: 2
          minLength: 2

    CompanyMembership:
      type: object
      allOf:
        - $ref: '#/components/schemas/Company'
        - type: object
          properties:
            role:
              type: string
              enum: [owner, admin, operations, viewer]
              description: The user's role in this company
              example: "owner"

    # Upload URL
    CreatePresignedUrlRequest:
      type: object
      required:
        - key
        - content_type
        - size
      properties:
        key:
          type: string
          example: "company-logos/logo.png"
          description: "S3 key path for the file"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotBlank"
        content_type:
          type: string
          enum: 
            - "image/jpeg"
            - "image/jpg"
            - "image/png"
            - "image/webp"
            - "image/bmp"
            - "image/heic"
            - "image/heif"
            - "application/pdf"
          description: "Content type of the file - only image formats are allowed (including iPhone HEIC/HEIF formats)"
          example: "image/png"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotNull"
        size:
          type: integer
          format: int64
          example: 233444
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotNull"
            - "@jakarta.validation.constraints.Positive"

    DeletePresignedUrlRequest:
      type: object
      required:
        - key
      properties:
        key:
          type: string
          description: S3 object key for the file to delete
          example: "company-logos/logo-123.png"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotNull"


    # File Management Schemas
    PresignedUrlIntent:
      type: string
      enum: [company_logo, invoice, delivery_note, property_image, profile_picture]
      description: Category intent for presigned URL generation with different durations and ACL settings
      example: "company_logo"

    PreSignedUrl:
      type: object
      required:
        - url
        - expiration
      properties:
        url:
          type: string
          format: url
          description: The presigned URL for file operations
          example: "https://passport-identity.lon1.digitaloceanspaces.com/company-logos/logo-123.png?AWSAccessKeyId=..."
        expiration:
          type: string
          format: date-time
          description: When the presigned URL expires
          example: "2024-01-15T10:30:00Z"

    # Project
    ProjectStatus:
      type: string
      enum: [active, archived, completed, cancelled]
      description: Project status
      example: "active"


    ProjectCreate:
      type: object
      required:
        - name
        - key
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^\S.*$'
          description: Project name (cannot be blank or whitespace-only)
          example: "Acme Analytics Platform"
        key:
          type: string
          minLength: 1
          maxLength: 50
          pattern: '^[a-zA-Z0-9-_]+$'
          description: "Unique project identifier (alphanumeric, hyphens, underscores only)"
          example: "acme-analytics"
        description:
          type: string
          nullable: true
          description: Details about the project
          example: "A platform for real-time insights."
        defaultShippingLocation:
          type: string
          nullable: true
          description: Contact ID for the default shipping/delivery location for this project
          example: "01HX0X8YB9X4JTY9ZGR1E2E3FQ"
    ProjectUpdate:
      type: object
      x-class-extra-annotation: "@com.tosspaper.common.validator.AtLeastOneNotNull"
      properties:
        name:
          type: string
          nullable: true
          minLength: 1
          maxLength: 50
          pattern: '^\S.*$'
          description: Project name (if provided, cannot be blank or whitespace-only)
          example: "Acme Analytics Platform"
        description:
          type: string
          nullable: true
          description: Details about the project
          example: "A platform for real-time insights."
        status:
          type: string
          nullable: true
          enum: [archived, active, completed, cancelled]
          description: Project status
          example: "active"
        defaultShippingLocation:
          type: string
          nullable: true
          description: Contact ID for the default shipping/delivery location for this project
          example: "01HX0X8YB9X4JTY9ZGR1E2E3FQ"
    Project:
      type: object
      properties:
        id:
          type: string
          description: Unique identifier for the project
          example: "01HX0X8YB9X4JTY9ZGR1E2E3FQ"
        status:
          type: string
          enum: [archived, active, completed, cancelled]
          description: Project status
          example: "active"
        created_at:
          type: string
          format: date-time
          description: Timestamp of creation
          example: "2025-06-03T02:48:43Z"
        updated_at:
          type: string
          format: date-time
          description: Timestamp of last update
          example: "2025-06-03T02:48:43Z"
        name:
          type: string
          maxLength: 50
          description: Project name
          example: "Acme Analytics Platform"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.Size(max=50)"
        key:
          type: string
          maxLength: 50
          description: "Unique project identifier. User provided."
          example: "acme-analytics"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.Size(max=50)"
        description:
          type: string
          nullable: true
          description: Details about the project
          example: "A platform for real-time insights."
        defaultShippingLocation:
          type: string
          nullable: true
          description: Contact ID for the default shipping/delivery location for this project
          example: "01HX0X8YB9X4JTY9ZGR1E2E3FQ"

    ProjectList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Project'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # Permissions
    RoleIdEnum:
      type: string
      enum: [owner, admin, operations, viewer]
      description: "Role identifier"

    RolePermissions:
      type: object
      required:
        - roleId
        - permissions
      properties:
        roleId:
          type: string
          description: "Role identifier (e.g., owner, admin)"
          example: "owner"
        permissions:
          type: array
          items:
            type: string
          description: "List of permissions for this role in 'resource:action' format"
          example: ["companies:view", "companies:edit", "documents:upload"]

    PermissionsResponse:
      type: object
      required:
        - roles
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/RolePermissions'
          description: "List of all roles and their permissions"

    # Contact
    ContactTagEnum:
      type: string
      enum: [supplier, vendor, ship_to]
      description: "Tag for a contact. Can be 'supplier', 'vendor', or 'ship_to'."

    ContactStatus:
      type: string
      enum: [active, archived]
      description: "The status of the contact"

    ContactCreate:
      type: object
      required:
        - name
        - tag
      x-class-extra-annotation: "@com.tosspaper.common.validator.AtLeastOneNotNull"
      properties:
        name:
          type: string
          description: "Name of the contact."
          example: "John Doe"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotBlank"
        address:
          $ref: '#/components/schemas/Address'
          description: "Physical address of the contact."
        notes:
          type: string
          nullable: true
          description: "Additional notes about the contact."
          example: "Primary contact for billing."
        phone:
          type: string
          nullable: true
          description: "Phone number of the contact. Must be unique within the company."
          example: "+1-555-123-4567"
        email:
          type: string
          format: email
          nullable: true
          description: "Email address of the contact. Must be unique within the company."
          example: "john.doe@supplier.com"
        tag:
          $ref: '#/components/schemas/ContactTagEnum'
          description: "Tag for the contact (required)."
        currencyCode:
          type: string
          nullable: true
          description: "ISO 4217 currency code (e.g., USD, CAD, EUR)"
          example: "USD"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidCurrencyCode"

    ContactUpdate:
      type: object
      x-class-extra-annotation: "@com.tosspaper.common.validator.AtLeastOneNotNull"
      properties:
        name:
          type: string
          nullable: true
          description: "Name of the contact."
          example: "John Doe"
        address:
          $ref: '#/components/schemas/Address'
          nullable: true
          description: "Physical address of the contact."
        notes:
          type: string
          nullable: true
          description: "Additional notes about the contact."
          example: "Primary contact for billing."
        phone:
          type: string
          nullable: true
          description: "Phone number of the contact. Must be unique within the company."
          example: "+1-555-123-4567"
        email:
          type: string
          format: email
          nullable: true
          description: "Email address of the contact. Must be unique within the company."
          example: "john.doe@supplier.com"
        tag:
          $ref: '#/components/schemas/ContactTagEnum'
          nullable: true
          description: "Tag for the contact."
        status:
          $ref: '#/components/schemas/ContactStatus'
        currencyCode:
          type: string
          nullable: true
          description: "ISO 4217 currency code (e.g., USD, CAD, EUR)"
          example: "USD"
          x-field-extra-annotation: "@com.tosspaper.common.validator.ValidCurrencyCode"

    ContactList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Contact'
        pagination:
          $ref: '#/components/schemas/Pagination'

    Contact:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier for the contact (ULID)."
          example: "01HYB3Q8B6Z9Y1XWJ8Z8X8Z8X8"
        created_at:
          type: string
          format: date-time
          description: "Timestamp of creation."
          example: "2025-06-03T02:48:43Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp of last update."
          example: "2025-06-03T02:48:43Z"
        name:
          type: string
          description: "Name of the contact."
          example: "John Doe"
        address:
          $ref: '#/components/schemas/Address'
          description: "Physical address of the contact."
        notes:
          type: string
          nullable: true
          description: "Additional notes about the contact."
          example: "Primary contact for billing."
        phone:
          type: string
          nullable: true
          description: "Phone number of the contact."
          example: "+1-555-123-4567"
        email:
          type: string
          format: email
          nullable: true
          description: "Email address of the contact."
          example: "john.doe@supplier.com"
        tag:
          $ref: '#/components/schemas/ContactTagEnum'
          nullable: true
          description: "Tag associated with the contact."
        status:
          $ref: '#/components/schemas/ContactStatus'
        provider:
          type: string
          nullable: true
          description: "Integration provider identifier (null for platform-created contacts, e.g., 'quickbooks', 'xero')"
          example: "quickbooks"
        currencyCode:
          type: string
          nullable: true
          description: "ISO 4217 currency code (e.g., USD, CAD, EUR). Set from integration provider for synced contacts."
          example: "USD"

    # Address
    Address:
      type: object
      properties:
        address:
          type: string
          description: "Physical address."
          example: "123 Main Street"
        city:
          type: string
          description: "City."
          example: "Vancouver"
        country:
          type: string
          nullable: true
          description: "Country. Optional to support synced data from external providers (e.g., QuickBooks) where country may be null."
          example: "Canada"
        state_or_province:
          type: string
          nullable: true
          description: "State or province of the address. Optional to support synced data from external providers (e.g., QuickBooks) where state/province may be null."
          example: "British Columbia"
        postal_code:
          type: string
          description: "Postal code of the address"
          example: "V6B 1A1"

    # Property Status
    PropertyStatus:
      type: string
      enum: [active, archived]
      description: "Property status"
      example: "active"

    # Property
    PropertyCreate:
      type: object
      required:
        - address
      properties:
        name:
          type: string
          nullable: true
          description: "Name of the property."
          example: "Sunset Towers"
        address:
          $ref: '#/components/schemas/Address'
        description:
          type: string
          nullable: true
          description: "Description of the property."
          example: "Modern residential building with 50 units"
        amenities:
          type: object
          additionalProperties: true
          nullable: true
          description: "Property amenities as JSON object."
          example: {"pool": true, "gym": true, "parking": true}

    Property:
      type: object
      properties:
        id:
          type: string
          description: "Unique identifier for the property (ULID)."
          example: "01HYB3Q8B6Z9Y1XWJ8Z8X8Z8X8"
        company_id:
          type: integer
          format: int64
          description: "ID of the company that owns this property."
          example: 123456789
        name:
          type: string
          nullable: true
          description: "Name of the property."
          example: "Sunset Towers"
        address:
          $ref: '#/components/schemas/Address'
        description:
          type: string
          nullable: true
          description: "Description of the property."
          example: "Modern residential building with 50 units"
        status:
          $ref: '#/components/schemas/PropertyStatus'
        amenities:
          type: object
          additionalProperties: true
          nullable: true
          description: "Property amenities as JSON object."
          example: {"pool": true, "gym": true, "parking": true}
        created_at:
          type: string
          format: date-time
          description: "Timestamp of creation."
          example: "2025-06-03T02:48:43Z"
        updated_at:
          type: string
          format: date-time
          nullable: true
          description: "Timestamp of last update."
          example: "2025-06-03T02:48:43Z"

    PropertyList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Property'
        pagination:
          $ref: '#/components/schemas/Pagination'

    # Purchase Order
    PurchaseOrderStatus:
      type: string
      enum: [pending, in_progress, cancelled, completed, closed, open]
      description: "Purchase order status"
      example: "pending"

    InvoiceStatus:
      type: string
      enum: [draft, pending]
      description: "Invoice status. 'draft' and 'pending' are used within the document approval workflow. Approved documents are represented as final invoice records and do not use this status."
      example: "pending"

    DeliverySlipStatus:
      type: string
      enum: [draft, delivered]
      description: "Delivery slip status. All delivery slips returned by listing endpoints are 'delivered' (approved documents only). Draft and rejected documents are filtered out and only visible in the document approval workflow."
      example: "delivered"

    DeliveryNoteStatus:
      type: string
      enum: [draft, delivered]
      description: "Delivery note processing status"
      example: "approved"

    MatchType:
      type: string
      enum: [pending, in_progress, direct, ai_match, no_match, manual, no_po_required]
      description: "Match status: 'pending' (not yet matched), 'in_progress' (AI actively searching), 'direct' (matched by PO number in document), 'ai_match' (AI determined match), 'no_match' (no PO found), 'manual' (manually linked by user), 'no_po_required' (user confirmed no PO needed)"
      example: "pending"

    ChangeLogEntry:
      type: object
      properties:
