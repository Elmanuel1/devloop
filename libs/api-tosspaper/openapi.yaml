              schema:
                type: string
              description: Entity tag for concurrency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tender'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Conflict
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    get:
      operationId: listTenders
      summary: List Tenders
      tags:
        - Tenders
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: string
          description: Company ID
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
        - name: cursor
          in: query
          required: false
          schema:
            type: string
        - name: search
          in: query
          required: false
          schema:
            type: string
            maxLength: 255
        - name: sort
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TenderSortField'
        - name: direction
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TenderSortDirection'
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/TenderStatus'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TenderListResponse'
        '400':
          description: Bad Request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /v1/tenders/{tenderId}:
    get:
      operationId: getTender
      summary: Get Tender
      tags:
        - Tenders
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: string
          description: Company ID
        - name: tenderId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          headers:
            ETag:
              schema:
                type: string
              description: Entity tag for optimistic concurrency
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Tender'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      operationId: updateTender
      summary: Update Tender
      tags:
        - Tenders
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: string
          description: Company ID
        - name: If-Match
          in: header
          required: false
          schema:
            type: string
          description: ETag from previous GET
        - name: tenderId
          in: path
          required: true
          schema:
