    post:
      operationId: approveSender
      tags:
        - "Sender Approvals"
      summary: "Approve or reject a sender (email or domain)"
      description: |
        Approve or reject an email sender or entire domain.
        
        **Idempotency**: This endpoint is idempotent. Multiple calls with the same parameters will produce the same result.
        - If already approved, calling approve again has no side effects
        - If already rejected, calling approve will restore threads and trigger extraction
        
        **Approval:**
        - Email: Restores threads from that sender and triggers extraction for all their attachments
        - Domain: Restores ALL threads from that domain and triggers extraction for all attachments
        
        **Rejection:**
        - Email: Soft-deletes threads from that sender (scheduled for permanent deletion after grace period)
        - Domain: Soft-deletes ALL threads from that domain (cannot reject public domains like gmail.com)
        
        **Auto-Detection**: The system automatically detects whether the senderIdentifier is an email or domain.
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: string
          description: Company ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveSenderRequest'
      responses:
        "200":
          description: "Sender approval/rejection processed successfully. Extraction triggered if approved."
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          description: "Forbidden. Cannot approve/reject blocked domains (gmail.com, yahoo.com, etc.) or invalid sender format."
        default:
          $ref: '#/components/responses/InternalServerError'


  /v1/sender-approvals/pending-documents:
    get:
      operationId: listPendingDocuments
      tags:
        - "Sender Approvals"
      summary: "List pending documents grouped by sender"
      description: |
        Retrieve documents pending approval grouped by sender email.
        Shows sender email, count of pending documents, and list of attachments awaiting approval.
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
      responses:
        "200":
          description: "List of pending documents grouped by sender"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PendingSenderApprovalList'
        "401":
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  # ============================================================
  # RBAC / Team Management Endpoints
  # ============================================================

  # User Invitations (no company context required)
  # Company Invitations (requires company context)
  /v1/invitations:
    get:
      operationId: listCompanyInvitations
      tags:
        - "Company Invitations"
      summary: "List company's sent invitations"
      description: |
        Retrieve invitations sent by a company with optional filters and cursor pagination.
        Requires invitations:view permission.
      security:
        - jwtAuth: []
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
        - name: email
          in: query
          schema:
            type: string
          description: "Filter by email (partial match, case-insensitive)"
        - name: status
          in: query
          schema:
            type: string
            enum: [invited, accepted, declined]
          description: "Filter by invitation status"
        - name: cursor
          in: query
          schema:
            type: string
          description: "Cursor for pagination (createdAt timestamp from previous response)"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: "Maximum number of results"
      responses:
        '200':
          description: "Paginated list of invitations"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedCompanyInvitationList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: sendInvitation
      tags:
        - "Company Invitations"
      summary: "Send invitation to user"
      description: |
        Invite a user to join the company with a specific role.
        Requires invitations:send permission (owner only).
      security:
        - jwtAuth: []
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SendInvitationRequest'
      responses:
        '201':
          description: "Invitation created"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyInvitation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/invitations/{email}:
    delete:
      operationId: cancelInvitation
      tags:
        - "Company Invitations"
      summary: "Cancel invitation"
      description: |
        Cancel a pending invitation.
        Requires invitations:cancel permission (owner only).
      security:
        - jwtAuth: []
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
        - name: email
          in: path
          required: true
          schema:
            type: string
          description: "Email of invitation to cancel"
      responses:
        '204':
          description: "Invitation cancelled"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/invitations/{code}:
    put:
      operationId: acceptInvitation
      tags:
        - "Company Invitations"
      summary: "Accept invitation by code"
      description: |
        Accept an invitation using the invitation code from email.
        No authentication required - the code itself acts as the authorization token.
        The code is a base64 URL-safe encoded string containing companyId and email.

        This endpoint is idempotent - calling it multiple times returns the same result.
      parameters:
        - name: code
          in: path
          required: true
          schema:
            type: string
          description: "Base64 URL-safe encoded invitation code (from email link)"
      responses:
        '200':
          description: "Invitation accepted successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CompanyInvitation'
        '400':
          description: "Invalid code, invitation not found, expired, or already declined"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  # Permissions
  /v1/permissions:
    get:
      operationId: getPermissions
      tags:
        - "Permissions"
      summary: "Get all role permissions"
      description: |
        Returns a list of all roles and their associated permissions.
        This is a static list from PermissionRegistry - no database queries.
        Does not require authentication.
      responses:
        '200':
          description: "List of all roles and their permissions"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PermissionsResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

  # Authorized Users (requires company context)
  /v1/authorized-users:
    get:
      operationId: listAuthorizedUsers
      tags:
        - "Team Members"
      summary: "List company's team members"
      description: |
        Retrieve authorized users for a company with optional filters and cursor pagination.
        Requires members:view permission.
      security:
        - jwtAuth: []
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
        - name: email
          in: query
          schema:
            type: string
          description: "Filter by email (partial match, case-insensitive)"
        - name: status
          in: query
          schema:
            type: string
            enum: [enabled, disabled]
          description: "Filter by user status"
        - name: roleId
          in: query
          schema:
            $ref: '#/components/schemas/RoleIdEnum'
          description: "Filter by role"
        - name: cursor
          in: query
          schema:
            type: string
          description: "Cursor for pagination (createdAt timestamp from previous response)"
        - name: limit
          in: query
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
          description: "Maximum number of results"
      responses:
        '200':
          description: "Paginated list of authorized users"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedAuthorizedUserList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/authorized-users/{userId}:
    patch:
      operationId: updateUserRole
      tags:
        - "Team Members"
      summary: "Update user's role"
      description: |
        Change a user's role in the company.
        Requires members:edit permission (owner only).
      security:
        - jwtAuth: []
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: "User ID to update"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRoleRequest'
      responses:
        '200':
          description: "Updated user"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthorizedUser'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: removeUser
      tags:
        - "Team Members"
      summary: "Remove user from company"
      description: |
        Remove a user's access to the company.
        Requires members:delete permission (owner only).
        Cannot remove the last owner.
      security:
        - jwtAuth: []
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
        - name: userId
          in: path
          required: true
          schema:
            type: string
          description: "User ID to remove"
      responses:
        '204':
          description: "User removed"
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Roles
  /v1/roles:
    get:
      operationId: getRoles
      tags:
        - "Roles"
      summary: "List available roles"
      description: |
        Get all available roles in the system.
        No authentication required.
      responses:
        '200':
          description: "List of roles"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoleInfo'

  # Integration Settings
  /v1/companies/{companyId}/integration-settings:
    get:
      operationId: getIntegrationSettings
      tags:
        - "Integrations"
      summary: "Get company integration settings"
      description: "Retrieves integration settings for a company including auto-approval configuration."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
      responses:
        '200':
          description: "Integration settings"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationSettings'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    put:
      operationId: updateIntegrationSettings
      tags:
        - "Integrations"
      summary: "Update company integration settings"
      description: "Updates integration settings for a company."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: "Company ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IntegrationSettingsUpdate'
      responses:
        '200':
          description: "Updated integration settings"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationSettings'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Integration Connections
  /v1/integrations/connections:
    get:
      operationId: listIntegrationConnections
      tags:
        - "Integrations"
      summary: "List integration connections"
      description: "Lists all integration connections for a company."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
      responses:
        '200':
          description: "List of connections"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IntegrationConnection'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /v1/integrations/connections/{connectionId}:
    put:
      operationId: updateIntegrationConnection
      tags:
        - "Integrations"
      summary: "Update integration connection"
      description: "Update connection status (enable/disable sync). Only 'enabled' and 'disabled' status values are allowed via API."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
          description: "Connection ID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - status
              properties:
                status:
                  type: string
                  enum: [enabled, disabled]
                  description: "Connection status. 'enabled' = sync on, 'disabled' = sync off"
      responses:
        '200':
          description: "Connection updated"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationConnection'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: disconnectIntegration
      tags:
        - "Integrations"
      summary: "Disconnect an integration"
      description: "Disconnects and removes an integration connection."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: connectionId
          in: path
          required: true
          schema:
            type: string
          description: "Connection ID"
      responses:
        '204':
          description: "Integration disconnected"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # Integration Providers
  /v1/integrations/providers:
    get:
      operationId: getIntegrationProviders
      tags:
        - "Integrations"
      summary: "Get available integration providers"
      description: "Returns list of available integration providers (QuickBooks, Xero, Sage, etc.)."
      responses:
        '200':
          description: "List of available providers"
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/IntegrationProvider'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # OAuth Flow
  /v1/integrations/{providerId}/auth-urls:
    post:
      operationId: createAuthUrl
      tags:
        - "Integrations"
      summary: "Create OAuth authorization URL"
      description: "Creates a new OAuth authorization request and returns the authorization URL. Each call generates a new state token."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: providerId
          in: path
          required: true
          schema:
            type: string
          description: "Provider ID (e.g., quickbooks, xero, sage)"
      responses:
        '200':
          description: "OAuth authorization URL"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationAuthUrl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # Items
  /v1/items:
    get:
      operationId: getItems
      tags:
        - "Items"
      summary: "Get Items for a company"
      description: "Returns list of items (products/services) synced from integration providers for the company."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: active
          in: query
          required: false
          description: Filter by active status
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: "List of items"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ItemList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      operationId: createItem
      tags:
        - "Items"
      summary: "Create a new Item"
      description: "Creates a new item for the company. If an active integration connection exists, the item will be synced to the provider."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemCreate'
      responses:
        '201':
          description: "Item created successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/InternalServerError'

  /v1/items/{id}:
    get:
      operationId: getItemById
      tags:
        - "Items"
      summary: "Get Item by ID"
      description: "Retrieves a specific item by its ID."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID of the item to retrieve
          schema:
            type: string
      responses:
        '200':
          description: "Item retrieved successfully"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateItem
      tags:
        - "Items"
      summary: "Update an Item"
      description: "Updates an existing item. If an active integration connection exists, the item will be synced to the provider."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID of the item to update
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ItemUpdate'
      responses:
        '204':
          description: "Item updated successfully. No Content."
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/InternalServerError'

  # Integration Accounts
  /v1/accounts:
    get:
      operationId: getIntegrationAccounts
      tags:
        - "Integration Accounts"
      summary: "Get Integration Accounts for a company"
      description: "Returns list of accounts (chart of accounts) synced from integration providers for the company."
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: type
          in: query
          required: false
          description: "Filter accounts by type. 'expense' returns only expense-related accounts (Expense, CostOfGoodsSold, OtherExpense, OtherCurrentAsset) suitable for PO line items. 'all' returns all account types."
          schema:
            type: string
            enum: [expense, all]
            default: all
      responses:
        '200':
          description: "List of integration accounts"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/IntegrationAccountList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ──────────────────── Tenders ────────────────────
  /v1/tenders:
    post:
      operationId: createTender
      summary: Create Tender
      tags:
        - Tenders
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: string
          description: Company ID
      requestBody:
