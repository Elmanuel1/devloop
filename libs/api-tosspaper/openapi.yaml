    DiscrepancyField:
      type: object
      description: Details for a single field discrepancy. Extracted and matched values are stored as strings (numbers are converted to strings).
      properties:
        extracted:
          type: string
          nullable: true
          description: Value extracted from the document (as string)
        matched:
          type: string
          nullable: true
          description: Value from the matched purchase order (as string)
        difference:
          type: number
          format: double
          nullable: true
          description: Calculated difference between extracted and matched values (only present for numeric fields)
      additionalProperties: false

    DiscrepancyDetails:
      type: object
      description: AI-generated discrepancies comparing extracted document parts to matched purchase order parts. Each key represents a field name (e.g., "quantity", "unitPrice") with its comparison details.
      additionalProperties:
        $ref: '#/components/schemas/DiscrepancyField'
      nullable: true
      example:
        quantity:
          extracted: 100.0
          matched: 100.0
          difference: 0.0
        unitPrice:
          extracted: 12.50
          matched: 12.00
          difference: 0.50

    ComparisonPartResult:
      type: object
      description: Result of comparing a single document part (vendor, ship-to, or line item) against the purchase order
      required: [type, status, matchScore, severity, comparisons]
      properties:
        type:
          type: string
          enum: [vendor, ship_to, line_item]
          description: Type of document part being compared
        status:
          type: string
          enum: [matched, partial, unmatched]
          description: Status of the comparison - matched (exact), partial (with discrepancies), or unmatched (no match found)
        matchScore:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: Overall match score between extracted document part and PO part (0.0-1.0)
        severity:
          type: string
          enum: [info, warning, blocking]
          description: Criticality of mismatches - info (minor), warning (notable), blocking (requires attention)
        extractedIndex:
          type: integer
          nullable: true
          description: 0-based index of the extracted line item (null for vendor/ship_to)
        poIndex:
          type: integer
          nullable: true
          description: 0-based index of the matched PO line item (null if no match or for vendor/ship_to)
        exactFields:
          type: array
          items:
            type: string
          description: Field names with exact matches (no comparison details needed)
          example: ["Description", "Quantity"]
        comparisons:
          type: array
          description: Field-by-field comparisons with human-readable values and explanations
          items:
            $ref: '#/components/schemas/FieldComparison'

    FieldComparison:
      type: object
      description: A single field comparison showing PO value, document value, and explanation
      required: [field, poValue, documentValue, match, isBlocking, explanation]
      properties:
        field:
          type: string
          description: Human-readable field name (e.g., Name, Address, Unit Price, Currency)
          example: "Unit Price"
        poValue:
          type: string
          description: Value from the Purchase Order, formatted for display
          example: "USD $28.00"
        documentValue:
          type: string
          description: Value extracted from the document, formatted for display
          example: "CAD $28.00"
        match:
          type: string
          enum: [exact, close, mismatch]
          description: Match classification - exact (identical), close (minor differences), mismatch (significant difference)
        isBlocking:
          type: boolean
          description: True if this field comparison causes a blocking issue that prevents approval
        explanation:
          type: string
          description: Human-readable explanation of the comparison result. Blocking issues are prefixed with 'BLOCKING:'
          example: "BLOCKING: Currency mismatch - PO uses USD but invoice is in CAD"

    DocumentComparisonResult:
      type: object
      description: Complete comparison result between an extracted document and its purchase order
      required: [documentId, poId, results]
      properties:
        documentId:
          type: string
          description: Unique identifier of the extracted document
        poId:
          type: string
          description: Unique identifier of the purchase order being compared against
        overallStatus:
          type: string
          enum: [matched, partial, unmatched]
          description: Overall status of the document comparison
        confidence:
          type: number
          format: double
          minimum: 0.0
          maximum: 1.0
          description: Overall confidence in the comparison result
        blockingIssues:
          type: integer
          minimum: 0
          description: Number of blocking issues detected that may require user attention
        results:
          type: array
          description: Array of comparison results for each part (vendor, ship_to, and line items)
          items:
            $ref: '#/components/schemas/ComparisonPartResult'

