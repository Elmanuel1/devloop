          type: string
          description: Attachment ID
        filename:
          type: string
          description: Filename of the attachment
        storageKey:
          type: string
          description: S3 storage key for the attachment
        messageId:
          type: string
          description: Email message ID
        dateReceived:
          type: string
          format: date-time
          description: Date when the email was received

    PendingSenderApproval:
      type: object
      properties:
        senderIdentifier:
          type: string
          description: Sender email address or domain
        documentsPending:
          type: integer
          description: Count of documents pending approval from this sender
        domainAccessAllowed:
          type: boolean
          description: Whether the sender's domain is allowed (false if disposable or personal email domain)
        attachments:
          type: array
          items:
            $ref: '#/components/schemas/PendingApprovalDocument'
          description: List of attachments pending approval

    PendingSenderApprovalList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/PendingSenderApproval'

    LinkPoRequest:
      type: object
      description: |
        Request payload for manually linking a document to a specific Purchase Order.
        Used when automatic matching needs to be overridden or when user manually selects a PO.
      required:
        - poNumber
      properties:
        poNumber:
          type: string
          description: |
            The unique identifier of the Purchase Order to link to the document.
            This PO must:
            - Already exist in the system (created via POST /v1/projects/{projectId}/purchase-orders)
            - Be ingested into the vector store (happens automatically after creation)
            - Belong to the same company as the document (validated by to_email matching)
            
            If the PO is not found in the vector store, the system will create a NO_MATCH result.
          example: "01HQFK8X4J2N3P5R7T9V1W3Y5Z"

    UpdateApprovedSenderRequest:
      type: object
      required:
        - email
        - whitelistValue
      properties:
        email:
          type: string
          format: email
          description: Email address to extract from
          example: "user@example.com"
        whitelistValue:
          type: string
          enum: [email, domain]
          description: Whitelist exact email or entire domain

    InvoiceDetails:
      type: object
      description: "Invoice-specific financial information"
      properties:
        currencyCode:
          type: string
          description: "Currency code (ISO 4217)"
          example: "USD"
        paymentTerms:
          type: string
          description: "Payment terms (e.g., 'Net 30')"
          example: "Net 30"
        dueDate:
          type: string
          format: date
          description: "Invoice due date (YYYY-MM-DD)"
          nullable: true

    ShipmentDetails:
      type: object
      description: "Shipment and logistics information specific to delivery slips and delivery notes"
      properties:
        warehouseLocation:
          type: string
          description: "Warehouse or depot location"
          nullable: true
        driverId:
          type: string
          description: "Driver name or identifier"
          nullable: true
        vehicleId:
          type: string
          description: "Vehicle identifier or license plate"
          nullable: true
        deliveryDate:
          type: string
          format: date-time
          description: "Delivery date and time in ISO 8601 format"
          nullable: true
        notes:
          type: string
          description: "Shipment notes or special handling instructions"
          nullable: true

    DeliveryAcknowledgement:
      type: object
      description: "Delivery acknowledgement and proof of delivery information"
      properties:
        acknowledgedDate:
          type: string
          format: date-time
          description: "Date and time when delivery was acknowledged in ISO 8601 format"
          nullable: true
        ticketId:
          type: string
          description: "Delivery ticket or reference number"
          nullable: true
        recipientName:
          type: string
          description: "Name of the person receiving the delivery"
          nullable: true
        recipientSignature:
          type: string
          description: "Signature or confirmation identifier of recipient"
          nullable: true
        status:
          type: string
          enum: ["delivered", "partial", "rejected"]
          description: "Status of delivery acknowledgement"
          nullable: true
        notes:
          type: string
          description: "Delivery acknowledgement notes or comments"
          nullable: true

    # ============================================================
    # RBAC / Team Management Schemas
    # ============================================================

    CompanyInvitation:
      type: object
      properties:
        companyId:
          type: integer
          format: int64
          description: "Company ID"
        email:
          type: string
          format: email
          description: "Invited user's email"
        roleId:
          $ref: '#/components/schemas/RoleIdEnum'
        roleName:
          type: string
          description: "Display name of role"
        status:
          type: string
          enum: [invited, accepted, declined]
          description: "Invitation status"
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp"
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp"
        expiresAt:
          type: string
          format: date-time
          nullable: true
          description: "Expiration timestamp (24 hours from creation)"

    SendInvitationRequest:
      type: object
      required:
        - email
        - roleId
      properties:
        email:
          type: string
          format: email
          description: "Email address to invite"
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.Email"
            - "@jakarta.validation.constraints.NotBlank"
        roleId:
          $ref: '#/components/schemas/RoleIdEnum'
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotBlank"

    PaginatedCompanyInvitationList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/CompanyInvitation'
        pagination:
          $ref: '#/components/schemas/Pagination'

    AuthorizedUser:
      type: object
      properties:
        id:
          type: string
          description: "User ID"
        companyId:
          type: integer
          format: int64
          description: "Company ID"
        userId:
          type: string
          description: "Supabase user ID (auth.users.id)"
        email:
          type: string
          format: email
          description: "User email"
        roleId:
          $ref: '#/components/schemas/RoleIdEnum'
        roleName:
          type: string
          description: "Display name of role"
        status:
          type: string
          enum: [enabled, disabled]
          description: "User status"
        createdAt:
          type: string
          format: date-time
          description: "Creation timestamp"
        updatedAt:
          type: string
          format: date-time
          description: "Last update timestamp"
        lastUpdatedBy:
          type: string
          nullable: true
          description: "User ID of last updater"

    UpdateUserRoleRequest:
      type: object
      required:
        - roleId
      properties:
        roleId:
          $ref: '#/components/schemas/RoleIdEnum'
          x-jakarta-validation-annotations:
            - "@jakarta.validation.constraints.NotBlank"

    PaginatedAuthorizedUserList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/AuthorizedUser'
        pagination:
          $ref: '#/components/schemas/Pagination'

    RoleInfo:
      type: object
      properties:
        id:
          type: string
          enum: [owner, admin, operations, viewer]
          description: "Role ID"
        displayName:
          type: string
          description: "Display name"
        canManageMembers:
          type: string
          description: "Whether this role can manage team members"

    # Integration Settings
    IntegrationSettings:
      type: object
      properties:
        currency:
          type: string
          description: "Company currency (ISO 4217)"
          example: "CAD"
        autoApprovalEnabled:
          type: boolean
          description: "Whether auto-approval is enabled"
          example: true
        autoApprovalThreshold:
          type: number
          format: decimal
          description: "Documents below this amount are auto-approved"
          example: 5000.00

    IntegrationSettingsUpdate:
      type: object
      properties:
        currency:
          type: string
          description: "Company currency (ISO 4217)"
          example: "CAD"
        autoApprovalEnabled:
          type: boolean
          description: "Whether auto-approval is enabled"
        autoApprovalThreshold:
          type: number
          format: decimal
          description: "Documents below this amount are auto-approved"

    IntegrationConnection:
      type: object
      properties:
        id:
          type: string
          description: "Connection ID"
        provider:
          type: string
          enum: [QUICKBOOKS, XERO, SAGE]
          description: "Integration provider"
        status:
          type: string
          enum: [disabled, enabled, expired, revoked]
          description: "Connection status. disabled = sync off, enabled = sync on, expired = token expired, revoked = user disconnected"
        externalCompanyName:
          type: string
          description: "Company name in external system"
        realmId:
          type: string
          description: "External realm/company ID"
        lastSyncAt:
          type: string
          format: date-time
          description: "Last sync timestamp"
        connectedAt:
          type: string
          format: date-time
          description: "When the connection was established"
        preferences:
          $ref: '#/components/schemas/IntegrationPreferences'
          nullable: true
          description: "Integration preferences (default currency, multicurrency status)"

    IntegrationPreferences:
      type: object
      properties:
        defaultCurrency:
          type: string
          nullable: true
          description: "ISO 4217 currency code for the default currency from provider (e.g., USD, CAD)"
          example: "USD"
        multicurrencyEnabled:
          type: boolean
          nullable: true
          description: "Whether multicurrency is enabled in the external provider"
          example: true

    IntegrationAuthUrl:
      type: object
      properties:
        authUrl:
          type: string
          format: uri
          description: "OAuth authorization URL"
        state:
          type: string
          description: "OAuth state for CSRF protection"

    IntegrationProvider:
      type: object
      properties:
        id:
          type: string
          description: "Provider ID (e.g., quickbooks, xero, sage)"
          example: "quickbooks"
        displayName:
          type: string
          description: "Display name for the provider"
          example: "QuickBooks Online"
        category:
          type: string
          description: "Category of integration (e.g., accounting)"
          example: "accounting"

    # ──────────────────── Tender Enums ────────────────────
    TenderStatus:
      type: string
      enum:
        - pending
        - submitted
        - won
        - lost
        - cancelled

    TenderCurrency:
      type: string
      enum:
        - CAD
        - USD

    TenderDeliveryMethod:
      type: string
      enum:
        - lump_sum
        - unit_price
        - stipulated_price
        - design_build
        - construction_management
        - cost_plus
        - time_and_materials
        - mixed

    TenderBondType:
      type: string
      enum:
        - bid
        - performance
        - labour_and_materials

    TenderConditionType:
      type: string
      enum:
        - insurance
        - certification
        - compliance
        - participation
        - prequalification
        - scheduling
        - safety
        - other

    TenderEventType:
      type: string
      enum:
        - site_visit
        - tender_meeting

    TenderSortField:
      type: string
      enum:
        - closing_date
        - created_at

    TenderSortDirection:
      type: string
      enum:
        - asc
        - desc

    # ──────────────────── Tender Embedded Objects ────────────────────
    TenderAddress:
      type: object
      properties:
        address:
          type: string
          description: Street address
        city:
          type: string
          nullable: true
        state_or_province:
          type: string
          nullable: true
        postal_code:
          type: string
          nullable: true
        country:
          type: string
          nullable: true

    TenderParty:
      type: object
      properties:
        role:
          type: string
          maxLength: 100
        name:
          type: string
        address:
          $ref: '#/components/schemas/TenderAddress'
        phone:
          type: string
          nullable: true
        email:
          type: string
          nullable: true

    TenderBond:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TenderBondType'
        percentage:
          type: number
          nullable: true
        fixed_amount:
          type: number
          nullable: true
        description:
          type: string
          nullable: true
          maxLength: 500

    TenderCondition:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TenderConditionType'
        description:
          type: string
          maxLength: 500

    TenderEvent:
      type: object
      properties:
        type:
          $ref: '#/components/schemas/TenderEventType'
        date:
          type: string
          format: date-time
          nullable: true
        mandatory:
          type: boolean
        location:
          type: string
          nullable: true
        details:
          type: string
          nullable: true
          maxLength: 1000

    # ──────────────────── Tender Schemas ────────────────────
    Tender:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        platform:
          type: string
          nullable: true
        status:
          $ref: '#/components/schemas/TenderStatus'
        currency:
          type: string
          nullable: true
        reference_number:
          type: string
          nullable: true
        location:
          $ref: '#/components/schemas/TenderAddress'
        scope_of_work:
          type: string
          nullable: true
        delivery_method:
          type: string
          nullable: true
        closing_date:
          type: string
          format: date-time
          nullable: true
        events:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderEvent'
        start_date:
          type: string
          format: date
          nullable: true
        completion_date:
          type: string
          format: date
          nullable: true
        inquiry_deadline:
          type: string
          format: date-time
          nullable: true
        submission_method:
          type: string
          nullable: true
        submission_url:
          type: string
          nullable: true
        bonds:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderBond'
        conditions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderCondition'
        liquidated_damages:
          type: string
          nullable: true
        parties:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderParty'
        metadata:
          type: object
          nullable: true
        version:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        created_by:
          type: string

    TenderCreateRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          maxLength: 255
        platform:
          type: string
          nullable: true
          maxLength: 255
        currency:
          type: string
          nullable: true
        closing_date:
          type: string
          format: date-time
          nullable: true
        delivery_method:
          type: string
          nullable: true

    TenderUpdateRequest:
      type: object
      properties:
        name:
          type: string
          maxLength: 255
        platform:
          type: string
          nullable: true
          maxLength: 255
        status:
          $ref: '#/components/schemas/TenderStatus'
        currency:
          type: string
          nullable: true
        reference_number:
          type: string
          nullable: true
          maxLength: 255
        location:
          $ref: '#/components/schemas/TenderAddress'
        scope_of_work:
          type: string
          nullable: true
        delivery_method:
          type: string
          nullable: true
        closing_date:
          type: string
          format: date-time
          nullable: true
        events:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderEvent'
        start_date:
          type: string
          format: date
          nullable: true
        completion_date:
          type: string
          format: date
          nullable: true
        inquiry_deadline:
          type: string
          format: date-time
          nullable: true
        submission_method:
          type: string
          nullable: true
          maxLength: 500
        submission_url:
          type: string
          nullable: true
        bonds:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderBond'
        conditions:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderCondition'
        liquidated_damages:
          type: string
          nullable: true
          maxLength: 255
        parties:
          type: array
          nullable: true
          items:
            $ref: '#/components/schemas/TenderParty'
        metadata:
          type: object
          nullable: true

    TenderCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid

    TenderListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Tender'
        pagination:
          $ref: '#/components/schemas/TenderPagination'

    TenderPagination:
      type: object
      properties:
        cursor:
          type: string
          nullable: true
          description: "Cursor for next page. Null if no more results."
        has_more:
          type: boolean

  responses:
    BadRequest:
      description: Bad Request - The request could not be understood by the server due to malformed syntax.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized - Authentication credentials are required and have failed or have not yet been provided.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden - The server understood the request, but is refusing to fulfill it.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not Found - The requested resource could not be found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict - The request could not be completed due to a conflict with the current state of the resource.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    InternalServerError:
      description: Internal Server Error - A generic error message, given when an unexpected condition was encountered.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

security:
  - jwtAuth: []

paths:
  /v1/companies:
    post:
      operationId: createCompany
      tags:
        - Company
      summary: Create a Company
      description: Creates a new company in the system.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyCreate'
      responses:
        '201':
          description: Company created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /v1/companies/{id}:
    get:
      operationId: getCompanyById
      tags:
        - Company
      summary: Get Company Information
      description: Retrieves information for a specific company.
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the company to retrieve
          schema:
            type: integer
            format: int64
      responses:
        '200':
          description: Successfully retrieved company information.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Company'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/InternalServerError'
    put:
      operationId: updateCompany
      tags:
        - Company
      summary: Update Company Information
      description: Updates attributes of an existing company.
      parameters:
        - name: id
          in: path
          required: true
          description: ID of the company to update
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompanyInfoUpdate'
      responses:
        '204':
          description: Company updated successfully. No Content.
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/InternalServerError'

  /v1/me/companies:
    get:
      operationId: getMyCompanies
      tags:
        - Company
      summary: Get My Companies
      description: Retrieves a list of companies associated with the current user.
      responses:
        '200':
          description: A list of companies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CompanyMembership'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /v1/files/presigned-urls:
    post:
      operationId: createPresignedUrl
      tags:
        - files
      summary: Request Upload URL
      description: Request a pre-signed URL to upload a file.
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePresignedUrlRequest'
      responses:
        '200':
          description: Pre-signed URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreSignedUrl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

    delete:
      operationId: deletePresignedUrl
      tags:
        - files
      summary: Request Delete URL
      description: Request a pre-signed URL to delete a file.
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeletePresignedUrlRequest'
      responses:
        '200':
          description: Pre-signed delete URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreSignedUrl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        default:
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: createPresignedDownloadUrl
      tags:
        - files
      summary: Request Download URL
      description: Request a pre-signed URL to download a file.
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: key
          in: query
          required: true
          description: S3 key of the file to download
          schema:
            type: string
      responses:
        '200':
          description: Pre-signed download URL generated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PreSignedUrl'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        default:
          $ref: '#/components/responses/InternalServerError'

  /v1/projects:
    post:
      operationId: createProject
      tags:
        - Projects
      summary: Create a Project
      description: Creates a new project. Project key must be unique.
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectCreate'
      responses:
        '200':
          description: Project created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Project'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          $ref: '#/components/responses/Conflict'
        default:
          $ref: '#/components/responses/InternalServerError'
    get:
      operationId: getProjects
      tags:
        - Projects
      summary: Get Company Projects
      description: Retrieves a list of projects for the company, with optional filtering.
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: page
          in: query
