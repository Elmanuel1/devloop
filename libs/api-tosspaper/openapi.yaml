            For 'no_match' type, this may be empty or contain comparison failures.

            AI agents should:
            1. Sort by score to find the best match
            2. Check individual field statuses to understand mismatches
            3. Use summaries to explain decisions to users
            4. Consider documentType when evaluating scores (delivery_slip allows partial quantities)
          items:
            $ref: '#/components/schemas/CandidateComparison'

    DeliverySlipList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeliverySlip'
        pagination:
          $ref: '#/components/schemas/Pagination'

    DeliveryNote:
      type: object
      properties:
        id:
          type: string
          description: "Delivery note ID (ULID)"
          example: "01K92R9EAW93023SR7429T67NA"
        extractionTaskId:
          type: string
          description: "Extraction task ID that generated this delivery note"
          example: "mg-1761883653140-20ac8abc"
        companyId:
          type: integer
          format: int64
          description: "Company ID"
        documentNumber:
          type: string
          description: "Delivery note number"
          example: "DN-2024-001"
        documentDate:
          type: string
          format: date
          description: "Delivery note date"
        projectId:
          type: string
          nullable: true
          description: "Project ID"
        projectName:
          type: string
          nullable: true
          description: "Project name"
        jobNumber:
          type: string
          nullable: true
          description: "Job number"
        poNumber:
          type: string
          nullable: true
          description: "Purchase order number (display ID)"
          example: "2505007"
        deliveryMethodNote:
          type: string
          nullable: true
          description: "Delivery method note"
        sellerInfo:
          type: object
          nullable: true
          description: "Seller/supplier party information (JSONB) - standardized field name"
          additionalProperties: true
        buyerInfo:
          type: object
          nullable: true
          description: "Buyer party information (JSONB) - standardized field name"
          additionalProperties: true
        shipToInfo:
          type: object
          nullable: true
          description: "Ship to party information (JSONB) - standardized field name"
          additionalProperties: true
        billToInfo:
          type: object
          nullable: true
          description: "Bill to party information (JSONB) - standardized field name"
          additionalProperties: true
        lineItems:
          type: array
          description: "Line items - always includes ticket_number, unit_cost (price), and weight when available in source document"
          items:
            $ref: '#/components/schemas/LineItem'
        shipmentDetails:
          $ref: '#/components/schemas/ShipmentDetails'
          nullable: true
          description: "Shipment and logistics details (warehouse location, driver, vehicle, delivery date)"
        deliveryAcknowledgement:
          $ref: '#/components/schemas/DeliveryAcknowledgement'
          nullable: true
          description: "Delivery acknowledgement and proof of delivery"
        createdAt:
          type: string
          format: date-time
          description: "When the delivery note record was created"
        createdBy:
          type: string
          description: "User who created the delivery note record"
        status:
          $ref: '#/components/schemas/DeliveryNoteStatus'
          description: "Delivery note processing status"
        purchaseOrderId:
          type: string
          nullable: true
          description: "Linked purchase order ID (UUID)"
        matchType:
          $ref: '#/components/schemas/MatchType'
          nullable: true
        matchReport:
          type: array
          description: |
            Array of detailed comparisons for all candidate POs evaluated. Each comparison includes:
            - Overall match score (0.0-1.0)
            - Field-by-field comparison (supplier, ship-to, line items)
            - Match status for each field (MATCH, MISMATCH, PO_ONLY, DOC_ONLY, NOT_COMPARED)
            - Human-readable summaries explaining each comparison

            For 'direct' and 'similarity_match' types, this typically contains one comparison.
            For 'ai_match' type, this contains multiple candidates with their respective scores.
            For 'no_match' type, this may be empty or contain comparison failures.

            AI agents should:
            1. Sort by score to find the best match
            2. Check individual field statuses to understand mismatches
            3. Use summaries to explain decisions to users
            4. Consider documentType when evaluating scores
          items:
            $ref: '#/components/schemas/CandidateComparison'

    DeliveryNoteList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/DeliveryNote'
        pagination:
          $ref: '#/components/schemas/Pagination'

    LineItem:
      type: object
      description: "Standardized line item structure for invoices, delivery slips, and delivery notes. Always includes ticket_number, unit_cost (price), and weight when available in source document."
      properties:
        itemNo:
          type: string
          description: "Line item number (sequential order of appearance)"
          example: "1"
        itemCode:
          type: string
          nullable: true
          description: "SKU/product code"
          example: "SAN.MH08"
        description:
          type: string
          description: "Item description"
          example: "Concrete Mix Type A"
        unit:
          type: string
          nullable: true
          description: "Unit of measure (e.g., MT, EA, KG)"
          example: "MT"
        quantity:
          type: number
          format: double
          description: "Quantity delivered/charged"
          example: 10.5
        unitCost:
          type: number
          format: double
          nullable: true
          description: "Price per unit. ALWAYS included when available - applicable to ALL document types (invoices, delivery slips, delivery notes)"
          example: 125.00
        total:
          type: number
          format: double
          nullable: true
          description: "Total line amount (quantity × unitCost). ALWAYS included when unitCost is available - applicable to ALL document types"
          example: 1312.50
        weight:
          type: number
          format: double
          nullable: true
          description: "Item weight. ALWAYS included when available - applicable to ALL document types (invoices, delivery slips, delivery notes)"
          example: 10500
        ticketNumber:
          type: string
          nullable: true
          description: "Delivery ticket number. ALWAYS included when available - applicable to ALL document types (invoices, delivery slips, delivery notes)"
          example: "3101311"
        shipDate:
          type: string
          format: date
          nullable: true
          description: "Delivery/shipment date for this line item"
          example: "2024-11-05"

    # Property Management Schemas
    
    # Enums
    UnitClass:
      type: string
      enum: [apartment, condo, single_family_home, townhouse, studio, luxury_rental, student_housing, senior_housing, hotel, extended_stay, commercial]
      description: "Type of unit/property class"
      
    ChargeFrequency:
      type: string
      enum: [one_time, hourly, daily, weekly, monthly, quarterly, annually]
      description: "Frequency of charge application"
      
    ChargeContext:
      type: string
      enum: [residential, hotel, commercial, student_housing, senior_housing]
      description: "Context or property type for the charge"
      
    PeriodType:
      type: string
      enum: [monthly, daily, weekly, yearly, hourly, flexible]
      description: "Type of lease period"

    ChargeType:
      type: string
      enum: [
        # Deposits
        security_deposit,
        pet_deposit,
        key_deposit,
        
        # Fees
        application_fee,
        admin_fee,
        late_fee,
        cleaning_fee,
        maintenance_fee,
        
        # Utilities & Services
        rent,
        parking_residential,
        parking_hotel,
        parking_commercial,
        utilities_residential,
        utilities_hotel,
        utilities_commercial,
        internet_residential,
        internet_hotel,
        internet_commercial,
        cable_tv,
        trash,
        
        # Hospitality/Hotel Specific
        resort_fee,
        early_checkin,
        late_checkout,
        room_service,
        minibar,
        
        # Commercial/Office Specific
        cam_charges,
        property_tax,
        insurance,
        
        # Miscellaneous
        storage,
        gym_access,
        pool_access,
        concierge,
        other
      ]
      description: "Type of charge in property management"

    # Base Charge Schema with common properties
    BaseCharge:
      type: object
      properties:
        amount:
          type: number
          multipleOf: 0.01
          minimum: 0
        context:
          $ref: '#/components/schemas/ChargeContext'
          default: residential
        refundable:
          type: boolean
          default: false
        metadata:
          type: object
          additionalProperties: true

    # Union of All Charge Types with Discriminator
    Charge:
      type: object
      required:
        - chargeType
      properties:
        chargeType:
          $ref: '#/components/schemas/ChargeType'
          description: "Type of charge - used as discriminator"
      oneOf:
        - $ref: '#/components/schemas/SecurityDepositCharge'
        - $ref: '#/components/schemas/PetDepositCharge'
        - $ref: '#/components/schemas/KeyDepositCharge'
        - $ref: '#/components/schemas/ApplicationFeeCharge'
        - $ref: '#/components/schemas/AdminFeeCharge'
        - $ref: '#/components/schemas/LateFeeCharge'
        - $ref: '#/components/schemas/CleaningFeeCharge'
        - $ref: '#/components/schemas/MaintenanceFeeCharge'
        - $ref: '#/components/schemas/RentCharge'
        - $ref: '#/components/schemas/ResidentialParkingCharge'
        - $ref: '#/components/schemas/HotelParkingCharge'
        - $ref: '#/components/schemas/CommercialParkingCharge'
        - $ref: '#/components/schemas/ResidentialUtilitiesCharge'
        - $ref: '#/components/schemas/HotelUtilitiesCharge'
        - $ref: '#/components/schemas/CommercialUtilitiesCharge'
        - $ref: '#/components/schemas/ResidentialInternetCharge'
        - $ref: '#/components/schemas/HotelInternetCharge'
        - $ref: '#/components/schemas/CommercialInternetCharge'
        - $ref: '#/components/schemas/CableTvCharge'
        - $ref: '#/components/schemas/TrashCharge'
        - $ref: '#/components/schemas/ResortFeeCharge'
        - $ref: '#/components/schemas/EarlyCheckinCharge'
        - $ref: '#/components/schemas/LateCheckoutCharge'
        - $ref: '#/components/schemas/RoomServiceCharge'
        - $ref: '#/components/schemas/MinibarCharge'
        - $ref: '#/components/schemas/CamChargesCharge'
        - $ref: '#/components/schemas/PropertyTaxCharge'
        - $ref: '#/components/schemas/InsuranceCharge'
        - $ref: '#/components/schemas/StorageCharge'
        - $ref: '#/components/schemas/GymAccessCharge'
        - $ref: '#/components/schemas/PoolAccessCharge'
        - $ref: '#/components/schemas/ConciergeCharge'
