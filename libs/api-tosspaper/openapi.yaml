  /v1/document-matches/{assignedId}/link-po:
    post:
      operationId: linkPurchaseOrder
      tags:
        - "Document Matching"
      summary: "Manually link a document to a specific Purchase Order"
      description: |
        Manually override automatic matching by linking an extracted document to a specific PO.
        
        **Use cases:**
        - User selects a different PO from the candidate list
        - Automatic matching failed but user knows the correct PO
        - User wants to re-link a document to a different PO
        
        **Process:**
        1. Validates the specified PO exists and belongs to the company
        2. Performs detailed field-by-field comparison between document and PO
        3. Creates/updates a DocumentMatch record with match_type=DIRECT
        4. Returns 202 Accepted immediately (processing happens asynchronously)

        **Important notes:**
        - The PO must already be in the vector store (i.e., created via the system)
        - If PO is not found in vector store, returns NO_MATCH
        - Creates an upsert - if match already exists for this document, it will be replaced
        
        **AI Integration Tips:**
        - Use this endpoint when user manually selects a PO from suggestions
        - Check the resulting match_report to show comparison details to user
        - Poll the extraction endpoint after ~2-5 seconds to get results
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          schema:
            type: string
          description: "Context header containing the authenticated company identifier."

        - name: assignedId
          in: path
          required: true
          description: |
            The unique ID of the extraction task (assigned_id).
            This is the document you want to link to a PO.
          schema:
            type: string
          example: "01HQFK8X4J2N3P5R7T9V1W3Y5Z"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LinkPoRequest'
      responses:
        "202":
          description: "Accepted. Request queued for async processing."
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/InternalServerError'

  /v1/document-matches/{assignedId}/rematch:
    post:
      operationId: rematch
      tags:
        - "Document Matching"
      summary: "Re-run automatic PO matching for a document"
      description: |
        Trigger a fresh automatic matching process for an already-extracted document.
        
        **Use cases:**
        - New POs were added to the system after the document was processed
        - Previous automatic match was unsatisfactory
        - User rejected the current match and wants to see other options
        - Initial matching failed (NO_MATCH) but POs are now available
        
        **Process:**
        1. Re-runs the complete matching workflow:
           - Direct match by PO number
           - Vector similarity search for candidates
           - AI evaluation of all viable candidates
        2. Creates/updates DocumentMatch record with new results
        3. Returns 202 Accepted immediately (processing happens asynchronously)
        
        **Important notes:**
        - This is a full re-match, not just a retry of the previous attempt
        - May find different POs if new ones were added to the system
        - Will replace any existing match for this document (upsert)
        - May take 5-15 seconds depending on number of candidate POs
        
        **AI Integration Tips:**
        - Use this when user is unhappy with current match suggestions
        - Check if new POs were recently created before calling this
        - Show "Re-analyzing..." status to user while processing
        - Poll the extraction endpoint after ~5-10 seconds for results
        - Compare new match_report with previous to show what changed
      parameters:
        - name: assignedId
          in: path
          required: true
          description: |
            The unique ID of the extraction task (assigned_id).
            This is the document you want to re-match.
          schema:
            type: string
          example: "01HQFK8X4J2N3P5R7T9V1W3Y5Z"
      responses:
        "202":
          description: "Accepted. Re-match request queued for async processing."
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'
        default:
          $ref: '#/components/responses/InternalServerError'

