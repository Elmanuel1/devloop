    DocumentMatch:
      type: object
      description: |
        Represents a document matching result that links an extracted document (invoice/delivery slip) to purchase orders.
        The matchReport contains detailed field-by-field comparisons for all candidate POs, allowing AI agents to:
        - Understand which PO(s) best match the document
        - See exactly what fields match or mismatch
        - Make informed decisions about approval/rejection
        - Present detailed comparison results to users
      properties:
        extractionTaskId:
          type: string
          description: Unique ID of the extraction task. Primary key linking to the extraction_task table.
          example: "01HQFK8X4J2N3P5R7T9V1W3Y5Z"
        documentType:
          type: string
          description: Type of extracted document. Determines comparison rules (e.g., delivery_slip allows partial quantities, invoice expects exact matches).
          enum: [invoice, delivery_slip]
          example: "invoice"
        fromEmail:
          type: string
          description: Email address of the document sender (typically the vendor).
          example: "vendor@supplier.com"
        toEmail:
          type: string
          description: Company's assigned email address where the document was received. Used for security scoping.
          example: "company@tosspaper.com"
        emailSubject:
          type: string
          nullable: true
          description: Subject line of the email containing the document. May be null if not available.
          example: "Invoice #INV-2024-001"
        receivedAt:
          type: string
          format: date-time
          description: Timestamp when the email was received by the system.
          example: "2024-01-15T10:30:00Z"
        matchType:
          type: string
          description: |
            Method used to determine the match:
            - direct: PO number found in document matched exactly to a PO in the system
            - similarity_match: Vector similarity search found a highly similar PO (>80% similar)
            - ai_match: AI evaluation was required to determine the best match from multiple candidates
            - no_match: No suitable PO could be found
          enum: [direct, similarity_match, ai_match, no_match]
          example: "ai_match"
        matchReport:
          type: array
          description: |
            Array of detailed comparisons for all candidate POs evaluated. Each comparison includes:
            - Overall match score (0.0-1.0)
            - Field-by-field comparison (supplier, ship-to, line items)
            - Match status for each field (MATCH, MISMATCH, PO_ONLY, DOC_ONLY, NOT_COMPARED)
            - Human-readable summaries explaining each comparison
            
            For 'direct' and 'similarity_match' types, this typically contains one comparison.
            For 'ai_match' type, this contains multiple candidates with their respective scores.
            For 'no_match' type, this may be empty or contain comparison failures.
            
            AI agents should:
            1. Sort by score to find the best match
            2. Check individual field statuses to understand mismatches
            3. Use summaries to explain decisions to users
            4. Consider documentType when evaluating scores (delivery_slip allows partial quantities)
          items:
            $ref: '#/components/schemas/CandidateComparison'
        reviewStatus:
          type: string
          enum: [pending, approved, rejected, needs_review]
          description: |
            Current review status of the match:
            - pending: Awaiting human review (default for manual matches and low-confidence AI matches)
            - approved: Match has been approved (auto-approved for direct/similarity matches, or manually approved)
            - rejected: Match has been rejected by a human reviewer
            - needs_review: System flagged this match as requiring special attention
        reviewedBy:
          type: string
          nullable: true
          description: User who reviewed the match
        reviewedAt:
          type: string
          format: date-time
          nullable: true
          description: When the match was reviewed
        createdAt:
          type: string
          format: date-time
          description: When the match was created
        updatedAt:
          type: string
          format: date-time
          description: When the match was last updated

    CandidateComparison:
      type: object
      description: |
        Contains a detailed field-by-field comparison between a candidate Purchase Order and the extracted document.
        This is the primary data structure AI agents use to understand match quality.
      required:
        - poId
        - poNumber
        - projectId
        - comparison
      properties:
        poId:
          type: string
          description: The unique identifier of the candidate Purchase Order being compared.
          example: "01HQFK8X4J2N3P5R7T9V1W3Y5Z"
        poNumber:
          type: string
          description: The display ID (PO number) of the candidate Purchase Order.
          example: "PO-2024-001"
        projectId:
          type: string
          description: The project ID associated with the candidate Purchase Order.
          example: "01HQFK8X4J2N3P5R7T9V1W3Y5Z"
        comparison:
          $ref: '#/components/schemas/DetailedComparison'

    DetailedComparison:
      type: object
      description: |
        Complete field-by-field comparison analysis between a PO and extracted document.
        Provides granular match status for every field to help AI agents:
        - Identify exactly what matches and what doesn't
        - Understand why the score is what it is
        - Generate explanations for users
        - Make approval recommendations
        
        Scoring logic:
        - Supplier info: 30% weight (name 15%, address 10%, contact 5%)
        - Ship-to info: 20% weight (name 10%, address 8%, contact 2%)
        - Line items: 50% weight (distributed across all items)
        - Score ≥ 0.80 indicates a good match
        - Score < 0.80 indicates poor match requiring review
        
        Special rules by document type:
        - delivery_slip: Partial quantities/subset items are acceptable (don't reduce score)
        - invoice: Exact matches expected, but partial payments acceptable
      required:
        - score
        - summary
        - supplier
        - shipTo
        - suppliedTo
        - lineItems
      properties:
        score:
          type: number
          format: double
          description: |
            Overall weighted match score from 0.0 (no match) to 1.0 (perfect match).
            Calculated based on field-level match statuses and weighted by importance.
            Scores ≥ 0.80 typically indicate acceptable matches.
          minimum: 0.0
          maximum: 1.0
          example: 0.85
        summary:
          type: string
          description: |
            Human-readable 2-3 sentence summary of the overall comparison.
            Explains the key matching and mismatching factors in plain language.
            AI agents can use this as a starting point for user-facing explanations.
          example: "Strong match with matching supplier and ship-to information. All line items present with correct pricing. Minor address format differences noted but not significant."
        supplier:
          $ref: '#/components/schemas/ContactComparison'
        shipTo:
          $ref: '#/components/schemas/ContactComparison'
        suppliedTo:
          $ref: '#/components/schemas/ContactComparison'
        lineItems:
          type: array
          items:
            $ref: '#/components/schemas/LineItemComparison'

    ContactComparison:
      type: object
      description: |
        Comparison of contact information (supplier, ship-to, or customer).
        Breaks down contact info into individual fields for granular matching.
        AI agents can use this to identify specific issues (e.g., "phone number mismatch but everything else matches").
      required:
        - name
        - address
        - phone
        - email
      properties:
        name:
          $ref: '#/components/schemas/ComparisonField'
        address:
          $ref: '#/components/schemas/AddressComparison'
        phone:
          $ref: '#/components/schemas/ComparisonField'
        email:
          $ref: '#/components/schemas/ComparisonField'

    AddressComparison:
      type: object
      description: |
        Detailed address comparison broken into components.
        Allows AI to identify exactly which part of an address differs.
        Note: Minor formatting differences (e.g., "Street" vs "St") are typically considered MATCH.
      required:
        - street
        - city
        - stateOrProvince
        - postalCode
        - country
      properties:
        street:
          $ref: '#/components/schemas/ComparisonField'
        city:
          $ref: '#/components/schemas/ComparisonField'
        stateOrProvince:
          $ref: '#/components/schemas/ComparisonField'
        postalCode:
          $ref: '#/components/schemas/ComparisonField'
        country:
          $ref: '#/components/schemas/ComparisonField'

    LineItemComparison:
      type: object
      description: |
        Comparison of a single line item between PO and document.
        Critical for understanding item-level matching:
        
        **Item Matching Priority:**
        1. Match by itemCode (SKU/product code) if present - most reliable
        2. Match by itemName (description) if itemCode not available
        3. Never match by index position
        
        For delivery_slip documents:
        - Partial quantities are acceptable (delivering 50 of 100 ordered is valid)
        - Subset of items is acceptable (not all PO items need to be on slip)
        - overallStatus = MATCH even if quantity is less than PO
        
        For invoice documents:
        - Quantities typically match exactly
        - All items should generally be present
        - Pricing must match
        - Over-invoicing (quantity > PO) should be flagged as MISMATCH
        
        AI agents should check overallStatus first, then examine individual fields only if needed.
      required:
        - itemNo
        - itemName
        - quantity
        - unit
        - unitCost
        - total
        - overallStatus
        - summary
      properties:
        itemNo:
          $ref: '#/components/schemas/ComparisonField'
        itemCode:
          $ref: '#/components/schemas/ComparisonField'
        itemName:
          $ref: '#/components/schemas/ComparisonField'
        quantity:
          $ref: '#/components/schemas/ComparisonField'
        unit:
          $ref: '#/components/schemas/ComparisonField'
        unitCost:
          $ref: '#/components/schemas/ComparisonField'
        total:
          $ref: '#/components/schemas/ComparisonField'
        overallStatus:
          $ref: '#/components/schemas/MatchStatus'
        summary:
          type: string
          description: |
            Human-readable summary of this specific line item comparison.
            Explains the overall assessment (e.g., "Partial shipment - 50 of 100 units delivered" or "Perfect match on all fields").
            Should highlight itemCode when present (e.g., "Matched by SKU: ABC-123").
          example: "Partial shipment - 50 units delivered out of 100 ordered. Unit price matches."

    ComparisonField:
      type: object
      description: |
        Atomic field comparison showing values from both documents and the match assessment.
        This is the lowest level of comparison granularity.
        
        AI agents should:
        1. Check 'status' first for quick assessment
        2. Read 'summary' for human-readable explanation
        3. Compare 'poValue' and 'docValue' only if detailed analysis needed
        4. Consider 'docType' when interpreting results (delivery_slip vs invoice rules differ)
      required:
        - poValue
        - docType
        - docValue
        - status
        - summary
      properties:
        poValue:
          type: string
          nullable: true
          description: |
            The value from the Purchase Order. Null if this field doesn't exist in the PO.
            May be a string representation of any type (numbers, dates, etc.).
          example: "100"
        docType:
          type: string
          description: |
            Type of the extracted document being compared. Important context for interpreting the comparison.
            Different document types have different matching rules.
          enum: [invoice, delivery_slip]
          example: "delivery_slip"
        docValue:
          type: string
          nullable: true
          description: |
            The value from the extracted document. Null if this field doesn't exist in the document.
            May be a string representation of any type (numbers, dates, etc.).
          example: "50"
        status:
          $ref: '#/components/schemas/MatchStatus'
        summary:
          type: string
          description: |
            Brief human-readable explanation of this specific field comparison.
            Provides context that AI agents can use to generate user-facing messages.
            Example: "Partial quantity - 50 delivered out of 100 ordered" or "Prices match exactly"
          example: "Partial quantity - 50 units delivered out of 100 ordered"

    MatchStatus:
      type: string
      description: |
        Status classification for a field comparison. AI agents should interpret as follows:
        
        - MATCH: Values are semantically equivalent (may have minor formatting differences)
          → Positive signal, contributes to match score
          
        - MISMATCH: Values exist in both but are different
          → Negative signal, reduces match score significantly
          → AI should flag for human review
          
        - PO_ONLY: Field exists in PO but not in document
          → Neutral/minor negative (acceptable for optional fields)
          → For delivery_slip: acceptable (partial shipment)
          → For invoice: may indicate incomplete document
          
        - DOC_ONLY: Field exists in document but not in PO
          → Negative signal (unexpected data)
          → May indicate wrong PO or document extraction errors
          
        - NOT_COMPARED: Field was not compared (typically both null)
          → Neutral, doesn't affect score
      enum:
        - MATCH
        - MISMATCH
        - PO_ONLY
        - DOC_ONLY
        - NOT_COMPARED
      example: "MATCH"

