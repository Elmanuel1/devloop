  /v1/document-approvals/{approvalId}/extractions:
    post:
      operationId: reviewExtraction
      tags:
        - "Document Approvals"
      summary: "Review and approve or reject an extraction"
      description: |
        Review and approve or reject a document approval. When approved, the matched 
        purchase order status will be automatically updated to IN_PROGRESS (if currently PENDING),
        and invoice/delivery slip records will be created asynchronously.
        
        **Use cases:**
        - User confirms the document match is correct and wants to proceed
        - User rejects the document due to incorrect PO linking or other issues
        - User provides notes explaining their decision
        
        **Behavior:**
        - Approved documents: Sets approved_at timestamp and publishes event for async processing
          - PO status transitions to IN_PROGRESS (if currently PENDING)
          - Invoice/delivery slip records created asynchronously via Redis stream
          - Acceptance email sent to document sender
        - Rejected documents: Sets rejected_at timestamp and sends rejection email
          - PO status remains unchanged
          - No records created
        - Notes are optional but recommended for rejected documents
        
        **Important notes:**
        - The path parameter is actually an approval ID (ULID) from document_approvals table
        - Rejected documents can be approved later (rejected → approved transition allowed)
        - Approved documents cannot be rejected (approved → rejected transition blocked)
        - PO status transition only occurs if PO is currently PENDING
        - If PO is already IN_PROGRESS, COMPLETED, or CANCELLED, no status change occurs
      parameters:
        - name: X-Context-Id
          in: header
          required: true
          description: Company ID
          schema:
            type: string
        - name: approvalId
          in: path
          required: true
          description: Approval ID (ULID) from the document_approvals table
          schema:
            type: string
            example: "01HQFK8X4J2N3P5R7T9V1W3Y5Z"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewExtractionRequest'
      responses:
        "204":
          description: Review processed successfully
        "400":
          description: Bad request - cannot reject an already approved document
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          description: Document approval not found or access denied (wrong company)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        default:
          $ref: '#/components/responses/InternalServerError'

