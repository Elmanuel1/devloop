services:
  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    container_name: tosspaper-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=${TEMPORAL_DB_PORT}
      - POSTGRES_USER=${TEMPORAL_DB_USER}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/dynamicconfig.yaml
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
      # TLS for database setup/migrations (temporal-sql-tool)
      - POSTGRES_TLS_ENABLED=true
      - POSTGRES_TLS_DISABLE_HOST_VERIFICATION=true
      - POSTGRES_TLS_CA_FILE=/etc/temporal/certs/rds-ca-global-bundle.pem
      # TLS for server runtime config
      - SQL_TLS=true
      - SQL_TLS_ENABLED=true
      - SQL_TLS_DISABLE_HOST_VERIFICATION=true
      - SQL_TLS_CA_FILE=/etc/temporal/certs/rds-ca-global-bundle.pem
      - SQL_HOST_VERIFICATION=false
    networks:
      - tosspaper-network
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
      - ./certs/rds-ca-global-bundle.pem:/etc/temporal/certs/rds-ca-global-bundle.pem:ro
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s
    env_file:
      - ./springboot_dev.env

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: tosspaper-temporal-ui
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - tosspaper-network
    depends_on:
      - temporal

  everything:
    image: ${IMAGE_TAG:-ghcr.io/build4africa/tosspaper:latest}
    platform: linux/arm64
    container_name: tosspaper-everything
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      ENV: ${ENV:-local}
      AWS_REGION: ${AWS_REGION:-us-west-2}
      OTEL_SDK_DISABLED: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      AI_COMPARISON_PROVIDER: ${AI_COMPARISON_PROVIDER:-openai}
      AI_STREAMING_ENABLED: ${AI_STREAMING_ENABLED:-false}
      JAVA_OPTS: >-
          -XX:+UnlockExperimentalVMOptions
          -XX:+UseZGC
          -XX:+UseContainerSupport
          -Xmx2g
          -Xms512m
          -XX:+UseStringDeduplication
          -XX:+HeapDumpOnOutOfMemoryError
          -Xss256k
          -XX:MaxDirectMemorySize=128m
          -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8080:8080"
    volumes:
      - ./files:/app/files
      - ./certs/rds-ca-global-bundle.pem:/app/certs/rds-ca-global-bundle.pem:ro
    networks:
      - tosspaper-network
    depends_on:
      temporal:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: '1.5'
        reservations:
          memory: 2G
          cpus: 1
    # Allow container to use host swap (memory + swap = 6G)
    memswap_limit: 6G
    env_file:
      - ./springboot_dev.env

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - tosspaper-network
    depends_on:
      everything:
        condition: service_healthy
    restart: unless-stopped

networks:
  tosspaper-network:
    driver: bridge
