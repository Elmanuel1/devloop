services:
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    environment:
      POSTGRES_DB: tosspaper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # - ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tosspaper-redis
    environment:
      REDIS_PASSWORD: mypass
    command: redis-server --requirepass mypass
    ports:
      - "6379:6379"
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mypass", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:latest
    container_name: tosspaper-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    networks:
      - tosspaper-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f temporal-server > /dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: tosspaper-temporal-ui
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - tosspaper-network
    depends_on:
      - temporal

  flyway:
    image: flyway/flyway:11-alpine
    platform: linux/arm64
    container_name: tosspaper-flyway
    command: -url=jdbc:postgresql://postgres:5432/tosspaper -user=postgres -password=postgres -locations=filesystem:/flyway/sql -baselineOnMigrate=true -baselineVersion=0 -connectRetries=60 migrate
    volumes:
      - ./flyway:/flyway/sql
    networks:
      - tosspaper-network
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    tty: true

  everything:
    image: ghcr.io/build4africa/tosspaper:0.1.21-snapshot
    platform: linux/arm64
    container_name: tosspaper-everything
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      JAVA_OPTS: >-
          -XX:+UnlockExperimentalVMOptions
          -XX:+UseZGC
          -XX:+UseContainerSupport
          -XX:MaxRAMPercentage=75.0
          -XX:+UseStringDeduplication
          -XX:+ExitOnOutOfMemoryError
          -Xss256k
          -XX:MaxDirectMemorySize=128m
          -Djava.security.egd=file:/dev/./urandom
    ports:
      - "8080:8080"
    volumes:
      - ./files:/app/files
      - ./certs/rds-ca-global-bundle.pem:/app/certs/rds-ca-global-bundle.pem:ro
    networks:
      - tosspaper-network
    depends_on:
      flyway:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      temporal:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: 1
        reservations:
          memory: 1G
          cpus: 1
    env_file:
      - ./springboot_dev.env

  nginx:
    image: nginx:latest
    container_name: nginx
    ports:
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro
    networks:
      - tosspaper-network
    depends_on:
      everything:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local

networks:
  tosspaper-network:
    driver: bridge
