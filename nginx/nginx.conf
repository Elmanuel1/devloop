# Rate limiting zones
limit_req_zone $binary_remote_addr zone=general:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=strict:10m rate=2r/s;
limit_req_status 429;

# Block suspicious user agents
map $http_user_agent $block_agent {
    default 0;
    ~*zgrab 1;
    ~*masscan 1;
    ~*ivre-masscan 1;
    ~*censys 1;
    ~*scanner 1;
    ~*bot 0; # Allow legitimate bots like Googlebot
    ~*Googlebot 0;
    ~*Bingbot 0;
}

# Block suspicious paths
map $request_uri $block_path {
    default 0;
    ~*\.(env|php|bak|old|backup|config|credentials|aws) 1;
    ~*admin.*config 1;
    ~*cgi-bin.*\.\. 1;
    ~*\.\./\.\. 1;
    ~*\+CSCO 1;
    ~*mstshash 1;
    ~*SMB 1;
    ~*ReportServer 1;
    ~*vkey 1;
}

# Upstream backend with keepalive
upstream everything_backend {
    server everything:8080;
    keepalive 32;
    keepalive_timeout 60s;
    keepalive_requests 1000;
}

# HTTP server (TLS terminated at ALB)
server {
    listen 80;
    server_name tosspaper.com dev-api.tosspaper.com;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # Hide server version
    server_tokens off;

    # Upload limits
    client_max_body_size 50M;

    # Block malicious requests before processing
    if ($block_agent) {
        return 403;
    }
    
    if ($block_path) {
        return 403;
    }
    
    # Block requests with suspicious patterns in URI path (not query string)
    # Only check for actual suspicious patterns, ignore URL-encoded characters
    # Use $uri which contains only the path, not query parameters
    if ($uri ~* "(\.env|config\.php|admin/config|backup|\.bak|aws|credentials|cgi-bin|ReportServer|vkey|mstshash|ab2[gh]|alive\.php|teorema505)") {
        return 403;
    }
    # Block path traversal attempts (only literal .. patterns, not encoded)
    if ($uri ~* "\.\./") {
        return 403;
    }
    if ($uri ~* "\.\.\\\\") {
        return 403;
    }
    
    # Block non-HTTP methods on suspicious paths
    if ($request_method !~ ^(GET|HEAD|POST|PUT|DELETE|PATCH|OPTIONS)$ ) {
        return 405;
    }
    
    # Health check (exact match, highest priority)
    location = /nginx-health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
    
    # Block common attack paths (high priority - before other locations)
    location ~ ^/(\.env|\.git|\.svn|\.htaccess|\.htpasswd|wp-admin|phpmyadmin|config\.php|admin/config|backup|\.bak|aws|credentials|cgi-bin|ReportServer|vkey|mstshash|ab2[gh]|alive\.php|teorema505) {
        return 403;
        access_log off;
    }
    
    # Actuator endpoints with rate limiting
    location /actuator/ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://everything_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
    }
    
    # SSE endpoint for comparison streaming (must be before general API location)
    location ~ ^/v1/comparisons/[^/]+/$ {
        limit_req zone=general burst=10 nodelay;
        proxy_pass http://everything_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";

        # SSE-specific settings
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3m;  # AI comparison can take 30-60s
        chunked_transfer_encoding on;

        # Tell upstream proxies not to buffer
        add_header X-Accel-Buffering no;

        # CORS headers
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Expose-Headers;
    }

    # API endpoints with rate limiting
    location ~ ^/(v1|mailgun|reducto)/ {
        limit_req zone=general burst=30 nodelay;
        proxy_pass http://everything_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Expose-Headers;
    }
    
    # Optional: Static file caching
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        limit_req zone=general burst=20 nodelay;
        proxy_pass http://everything_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
    
    # Main location (catch-all, lowest priority)
    location / {
        # Rate limiting - stricter for root path
        limit_req zone=strict burst=5 nodelay;
        
        proxy_pass http://everything_backend;
        
        # Essential headers
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cloudflare real IP
        proxy_set_header CF-Connecting-IP $http_cf_connecting_ip;
        
        # Enable keepalive to backend (CRITICAL)
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        
        # Pass through all CORS headers from backend (backend handles CORS validation)
        proxy_pass_header Access-Control-Allow-Origin;
        proxy_pass_header Access-Control-Allow-Credentials;
        proxy_pass_header Access-Control-Allow-Methods;
        proxy_pass_header Access-Control-Allow-Headers;
        proxy_pass_header Access-Control-Expose-Headers;
        proxy_pass_header Access-Control-Max-Age;
        
        # Hide nginx version
        proxy_hide_header Server;
        
        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;
        
        # Buffering optimization
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
        proxy_busy_buffers_size 8k;
        proxy_max_temp_file_size 1024m;
    }
}