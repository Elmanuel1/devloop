# SonarQube Project Configuration
# This file provides an alternative way to configure SonarQube scanning
# Note: Properties in build.gradle take precedence when using the Gradle plugin

# Project identification
sonar.projectKey=tosspaper-email-engine
sonar.projectName=TossPaper Email Engine
sonar.projectVersion=1.0.0

# Source code settings
sonar.sourceEncoding=UTF-8
sonar.java.source=21
sonar.java.target=21

# Source and test directories (relative to this file)
sonar.sources=libs,services
sonar.tests=libs,services

# Exclusions
sonar.exclusions=**/generated/**,**/build/**,**/jooq/**,**/bin/**,**/*.class
sonar.test.exclusions=**/generated/**,**/build/**

# Coverage exclusions
sonar.coverage.exclusions=**/generated/**,**/jooq/**,**/model/**,**/dto/**,**/config/**,**/*Application.java,**/*Config.java

# Language settings
sonar.java.libraries=build/libs/*.jar
sonar.java.test.libraries=build/libs/*.jar

# Groovy/Spock test support
sonar.groovy.binaries=build/classes
sonar.groovy.libraries=build/libs/*.jar

# Multi-module project structure
sonar.modules=libs:models,libs:email-engine,libs:ai-engine,libs:api-tosspaper,libs:integrations,services:everything

# Quality gate
sonar.qualitygate.wait=true





