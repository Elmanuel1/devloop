# =============================================================================
# SOPS Configuration (AGE Encryption)
# =============================================================================
# Uses AGE keys for encryption (free, no cloud dependency).
# Private keys are stored in GitHub environment secrets as SOPS_AGE_KEY.
#
# Usage:
#   sops --encrypt secrets/stage-secrets.json > secrets/stage-secrets.enc.json
#   sops --encrypt secrets/prod-secrets.json > secrets/prod-secrets.enc.json
# =============================================================================

creation_rules:
  # Stage environment (public key)
  - path_regex: stage-secrets\.json$
    age: age1le4qhcx28330qr0cklezgtdpfz7azflyscp55kps7e5mt28699ds53ufge

  # Prod environment (public key)
  - path_regex: prod-secrets\.json$
    age: age177rcz99jakrh0rcmvmn7l93l2z02refk8q9f35r07pd8rrjj5ydsz34t48
