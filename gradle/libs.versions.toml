[versions]
spring-boot = "3.5.5"
spring-dep-mgmt = "1.1.7"
jooq = "3.19.26"
jooq-plugin = "9.0"
flyway = "11.1.0"
mapstruct = "1.5.5.Final"
lombok = "1.18.36"
postgresql = "42.7.4"
testcontainers = "1.20.4"
aws-sdk = "2.29.45"
spock = "2.4-M1-groovy-4.0"
groovy = "4.0.28"
openapi-generator = "7.10.0"
jakarta-validation = "3.0.2"
swagger-annotations = "2.2.26"
jackson-databind-nullable = "0.2.6"
jackson = "2.20.1"
spring-security = "6.4.2"
auth0 = "2.12.0"
commons-lang3 = "3.14.0"
guava = "33.3.1-jre"
vavr = "0.10.4"
redisson = "3.35.0"
netty = "4.1.115.Final"
pdfbox = "2.0.29"
spring-batch = "5.1.4"
resilience4j = "2.1.0"
mailgun = "2.1.0"
quickbooks-sdk = "6.7.0"
bouncycastle = "1.78.1"
sonarqube = "5.1.0.4882"
spring-cloud-aws = "3.4.0"
spring-cloud = "2025.0.1"

[libraries]
# Spring Boot
spring-boot-starter-web = { module = "org.springframework.boot:spring-boot-starter-web", version.ref = "spring-boot" }
spring-boot-starter-data-redis = { module = "org.springframework.boot:spring-boot-starter-data-redis", version.ref = "spring-boot" }
spring-boot-starter-validation = { module = "org.springframework.boot:spring-boot-starter-validation", version.ref = "spring-boot" }
spring-boot-starter-actuator = { module = "org.springframework.boot:spring-boot-starter-actuator", version.ref = "spring-boot" }
spring-boot-starter-jooq = { module = "org.springframework.boot:spring-boot-starter-jooq", version.ref = "spring-boot" }
spring-boot-starter-data-jpa = { module = "org.springframework.boot:spring-boot-starter-data-jpa", version.ref = "spring-boot" }
spring-boot-starter-batch = { module = "org.springframework.boot:spring-boot-starter-batch", version.ref = "spring-boot" }
spring-boot-starter-test = { module = "org.springframework.boot:spring-boot-starter-test", version.ref = "spring-boot" }
spring-boot-devtools = { module = "org.springframework.boot:spring-boot-devtools", version.ref = "spring-boot" }

# Jakarta & Validation
jakarta-validation-api = { module = "jakarta.validation:jakarta.validation-api", version.ref = "jakarta-validation" }

# Swagger & OpenAPI
swagger-annotations = { module = "io.swagger.core.v3:swagger-annotations", version.ref = "swagger-annotations" }
jackson-databind-nullable = { module = "org.openapitools:jackson-databind-nullable", version.ref = "jackson-databind-nullable" }

# Jackson
jackson-datatype-jsr310 = { module = "com.fasterxml.jackson.datatype:jackson-datatype-jsr310", version.ref = "jackson" }

# Spring Security
spring-security-test = { module = "org.springframework.security:spring-security-test", version.ref = "spring-security" }

# Database
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }
flyway-core = { module = "org.flywaydb:flyway-core", version.ref = "flyway" }
flyway-database-postgresql = { module = "org.flywaydb:flyway-database-postgresql", version.ref = "flyway" }

# JOOQ
jooq = { module = "org.jooq:jooq", version.ref = "jooq" }
jooq-meta = { module = "org.jooq:jooq-meta", version.ref = "jooq" }
jooq-codegen = { module = "org.jooq:jooq-codegen", version.ref = "jooq" }

# MapStruct
mapstruct = { module = "org.mapstruct:mapstruct", version.ref = "mapstruct" }
mapstruct-processor = { module = "org.mapstruct:mapstruct-processor", version.ref = "mapstruct" }

# Lombok
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }

# AWS SDK
aws-s3 = { module = "software.amazon.awssdk:s3", version.ref = "aws-sdk" }
aws-sqs = { module = "software.amazon.awssdk:sqs", version.ref = "aws-sdk" }
aws-sts = { module = "software.amazon.awssdk:sts", version.ref = "aws-sdk" }
aws-rds = { module = "software.amazon.awssdk:rds", version.ref = "aws-sdk" }
aws-jdbc-wrapper = { module = "software.amazon.jdbc:aws-advanced-jdbc-wrapper", version = "2.5.4" }

# Apache Commons
commons-lang3 = { module = "org.apache.commons:commons-lang3", version.ref = "commons-lang3" }

# Google Guava
guava = { module = "com.google.guava:guava", version.ref = "guava" }

# Vavr functional programming
vavr = { module = "io.vavr:vavr", version.ref = "vavr" }

# Redisson Redis client
redisson-spring-boot-starter = { module = "org.redisson:redisson-spring-boot-starter", version.ref = "redisson" }

# Netty DNS resolver for macOS
netty-resolver-dns-native-macos = { module = "io.netty:netty-resolver-dns-native-macos", version.ref = "netty" }

# Apache PDFBox for PDF processing
pdfbox = { module = "org.apache.pdfbox:pdfbox", version.ref = "pdfbox" }

# Resilience4j for resilience patterns
resilience4j-spring-boot3 = { module = "io.github.resilience4j:resilience4j-spring-boot3", version.ref = "resilience4j" }
resilience4j-retry = { module = "io.github.resilience4j:resilience4j-retry", version.ref = "resilience4j" }

# Mailgun SDK
mailgun = { module = "com.mailgun:mailgun-java", version.ref = "mailgun" }

# QuickBooks SDK
quickbooks-oauth2 = { module = "com.intuit.quickbooks-online:oauth2-platform-api", version.ref = "quickbooks-sdk" }
quickbooks-data = { module = "com.intuit.quickbooks-online:ipp-v3-java-data", version.ref = "quickbooks-sdk" }
quickbooks-devkit = { module = "com.intuit.quickbooks-online:ipp-v3-java-devkit", version.ref = "quickbooks-sdk" }

# BouncyCastle for encryption
bouncycastle-bcprov = { module = "org.bouncycastle:bcprov-jdk18on", version.ref = "bouncycastle" }

# Spring Cloud AWS (versions managed by BOMs)
spring-cloud-aws-bom = { module = "io.awspring.cloud:spring-cloud-aws-dependencies", version.ref = "spring-cloud-aws" }
spring-cloud-aws-parameter-store = { module = "io.awspring.cloud:spring-cloud-aws-starter-parameter-store" }
spring-cloud-bom = { module = "org.springframework.cloud:spring-cloud-dependencies", version.ref = "spring-cloud" }
spring-cloud-starter-bootstrap = { module = "org.springframework.cloud:spring-cloud-starter-bootstrap" }

# Testing
groovy-core = { module = "org.apache.groovy:groovy", version.ref = "groovy" }
spock-core = { module = "org.spockframework:spock-core", version.ref = "spock" }
spock-spring = { module = "org.spockframework:spock-spring", version.ref = "spock" }
junit-platform-launcher = { module = "org.junit.platform:junit-platform-launcher" }
testcontainers = { module = "org.testcontainers:testcontainers", version.ref = "testcontainers" }
testcontainers-postgresql = { module = "org.testcontainers:postgresql", version.ref = "testcontainers" }
testcontainers-spock = { module = "org.testcontainers:spock", version.ref = "testcontainers" }
testcontainers-junit-jupiter = { module = "org.testcontainers:junit-jupiter", version.ref = "testcontainers" }

[plugins]
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dep-mgmt = { id = "io.spring.dependency-management", version.ref = "spring-dep-mgmt" }
jooq-plugin = { id = "nu.studer.jooq", version.ref = "jooq-plugin" }
flyway = { id = "org.flywaydb.flyway", version.ref = "flyway" }
openapi-generator = { id = "org.openapi.generator", version.ref = "openapi-generator" }
sonarqube = { id = "org.sonarqube", version.ref = "sonarqube" }
