# Supabase Configuration
# This configuration enables Supabase OAuth2/JWT authentication for api-tosspaper endpoints

# Supabase Auth Hook Configuration
supabase:
  url: ${SUPABASE_URL:https://jbejwnaxmwomppvzzbhg.supabase.co}  # Your Supabase project URL
  service-role-key: ${SUPABASE_SERVICE_ROLE_KEY:}  # Service role key for admin operations (keep secret!)
  webhook:
    secret: ${SUPABASE_WEBHOOK_SECRET:}  # Secret for verifying webhook signatures from Supabase auth hooks

# HTTP Security Configuration for Supabase
http:
  security:
    enabled: true
    jwt:
      # Supabase JWT issuer URL
      issuer: ${SUPABASE_JWT_ISSUER:https://jbejwnaxmwomppvzzbhg.supabase.co/auth/v1}
      # Your application's audience/identifier
      audience: ${SUPABASE_JWT_AUDIENCE:authenticated}
      # Supabase JWT verification endpoint
      jwk-set-uri: ${SUPABASE_JWKS_URI:https://jbejwnaxmwomppvzzbhg.supabase.co/auth/v1/.well-known/jwks.json}
      cache:
        expire-after-write: ${HTTP_SECURITY_JWT_JWKS_CACHE_EXPIRE_AFTER_WRITE:PT72H}
        maximum-size: ${HTTP_SECURITY_JWT_JWKS_CACHE_MAXIMUM_SIZE:100}
    insecure:
      # Paths that do NOT require authentication (email engine webhooks, AI webhooks, Supabase auth hooks, QuickBooks webhooks)
      paths: /*/email-messages,/reducto/webhook,/actuator/**,/auth/hooks/**,/v1/quickbooks/events
    authenticated:
      # Paths that require authentication (api-tosspaper endpoints only)
      # Email engine APIs remain unauthenticated
      paths: /v1/companies/**,/v1/projects/**,/v1/contacts/**,/v1/purchase-orders/**
    csrf:
      # CSRF disabled - Bearer token APIs are not vulnerable to CSRF since
      # browsers don't auto-attach Authorization headers like they do cookies.
      # This is a REST API with JWT auth only; CSRF protection is unnecessary.
      enabled: false
    csrf-ignored:
      # Paths exempt from CSRF validation (must match insecure paths)
      paths: /*/email-messages,/reducto/webhook,/actuator/**,/auth/hooks/**,/v1/quickbooks/events
    cors:
      domains: ${HTTP_SECURITY_CORS_DOMAINS:http://localhost:3000}