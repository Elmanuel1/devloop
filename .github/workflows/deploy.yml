name: Deploy

on:
  workflow_call:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: string
      version:
        description: 'Image version (SHA) to deploy'
        required: true
        type: string
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deployment environment'
        required: true
        type: choice
        options:
          - stage
          - prod
        default: stage
      version:
        description: 'Image version (SHA) to deploy - leave empty for latest'
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: build4africa/tosspaper
  AWS_REGION: "us-west-2"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ inputs.environment }}
      url: ${{ vars.APP_URL }}
    permissions:
      id-token: write
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          VERSION="${{ inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="latest"
            echo "No version specified, using: $VERSION"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Deploying version: $VERSION"

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::905418019159:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Assume Role in Target Account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/OrganizationAccountAccessRole
          aws-region: ${{ env.AWS_REGION }}
          role-chaining: true
          role-skip-session-tagging: true

      - name: Get EC2 Instance IDs
        id: ec2
        run: |
          # Get ALL running instances for this environment
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters "Name=tag:Environment,Values=${{ inputs.environment }}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].InstanceId' \
            --output text)

          if [[ -z "$INSTANCE_IDS" ]]; then
            echo "::error::No running EC2 instances found for ${{ inputs.environment }}"
            exit 1
          fi

          # Convert to comma-separated for output
          INSTANCE_IDS_CSV=$(echo $INSTANCE_IDS | tr ' ' ',')
          INSTANCE_COUNT=$(echo $INSTANCE_IDS | wc -w | tr -d ' ')

          echo "instance_ids=$INSTANCE_IDS_CSV" >> $GITHUB_OUTPUT
          echo "instance_count=$INSTANCE_COUNT" >> $GITHUB_OUTPUT
          echo "Found $INSTANCE_COUNT EC2 instance(s): $INSTANCE_IDS_CSV"

      - name: Upload deployment files to S3
        run: |
          BUCKET="tosspaper-email-attachments-${{ inputs.environment }}"

          # Upload docker-compose, nginx config, and temporal config
          aws s3 cp docker-compose-remote.yml s3://$BUCKET/deploy/docker-compose.yml
          aws s3 sync nginx/ s3://$BUCKET/deploy/nginx/
          aws s3 sync temporal/ s3://$BUCKET/deploy/temporal/

          echo "Uploaded deployment files to S3"

      - name: Deploy via SSM
        run: |
          IMAGE_TAG="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}"
          BUCKET="tosspaper-email-attachments-${{ inputs.environment }}"
          ENVIRONMENT="${{ inputs.environment }}"

          DEPLOY_SCRIPT=$(cat <<'SCRIPT'
          set -e

          echo "=== Starting deployment ==="

          # Variables (substituted by GitHub Actions)
          IMAGE_TAG="__IMAGE_TAG__"
          BUCKET="__BUCKET__"

          # Navigate to app directory
          cd /opt/tosspaper

          # Download deployment files from S3
          echo "Downloading deployment files..."
          aws s3 cp s3://$BUCKET/deploy/docker-compose.yml docker-compose-remote.yml
          aws s3 sync s3://$BUCKET/deploy/nginx/ nginx/
          aws s3 sync s3://$BUCKET/deploy/temporal/ temporal/

          # Login to GHCR using token from Secrets Manager
          echo "Logging in to GHCR..."
          aws secretsmanager get-secret-value --secret-id tosspaper/ghcr-token --query 'SecretString' --output text | docker login ghcr.io -u github --password-stdin

          # Pull new image
          echo "Pulling image: $IMAGE_TAG"
          docker pull "$IMAGE_TAG"

          # Export IMAGE_TAG for docker-compose
          export IMAGE_TAG="$IMAGE_TAG"

          # Stop existing containers (keep volumes)
          echo "Stopping existing containers..."
          docker compose -f docker-compose-remote.yml down || true

          # Start with new image
          echo "Starting containers..."
          docker compose -f docker-compose-remote.yml up -d

          # Retry health check for up to 5 minutes
          echo "Waiting for application to be healthy..."
          for i in {1..30}; do
            if curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
              echo "Health check passed!"
              break
            fi
            echo "  Attempt $i/30 - waiting..."
            sleep 10
          done

          # Final verification
          if ! curl -sf http://localhost:8080/actuator/health > /dev/null 2>&1; then
            echo "Health check failed after 5 minutes!"
            docker compose -f docker-compose-remote.yml logs everything --tail=100
            exit 1
          fi

          # Cleanup old images
          docker image prune -f

          echo "=== Deployment complete ==="
          SCRIPT
          )

          # Substitute variables (no secrets - GHCR token fetched from SSM at runtime)
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__IMAGE_TAG__/$IMAGE_TAG}"
          DEPLOY_SCRIPT="${DEPLOY_SCRIPT//__BUCKET__/$BUCKET}"

          # Get instances as array for canary deployment
          IFS=',' read -ra INSTANCES <<< "${{ steps.ec2.outputs.instance_ids }}"
          TOTAL=${#INSTANCES[@]}

          # Canary = first instance
          CANARY="${INSTANCES[0]}"

          echo "=== Canary Deployment Strategy ==="
          echo "Total instances: $TOTAL"
          echo "Canary instance: $CANARY"

          # Deploy to canary first
          echo ""
          echo "=== Deploying canary: $CANARY ==="
          CANARY_COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$CANARY" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[$(echo "$DEPLOY_SCRIPT" | jq -Rs .)]}" \
            --timeout-seconds 600 \
            --query 'Command.CommandId' \
            --output text)

          echo "Canary SSM Command ID: $CANARY_COMMAND_ID"
          echo "Waiting for canary deployment to complete..."

          # Wait for canary command to complete (poll until done)
          CANARY_STATUS="InProgress"
          for i in {1..60}; do
            CANARY_STATUS=$(aws ssm list-commands --command-id "$CANARY_COMMAND_ID" --query 'Commands[0].Status' --output text)
            echo "Canary command status: $CANARY_STATUS"
            if [[ "$CANARY_STATUS" == "Success" || "$CANARY_STATUS" == "Failed" || "$CANARY_STATUS" == "Cancelled" ]]; then
              break
            fi
            sleep 10
          done

          # Get canary results
          echo ""
          echo "=== Canary Deployment Results ==="
          CANARY_INVOCATION=$(aws ssm list-command-invocations \
            --command-id "$CANARY_COMMAND_ID" \
            --details \
            --query 'CommandInvocations[0].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}' \
            --output json)

          echo "$CANARY_INVOCATION" | jq -r '"Instance: \(.Instance) - Status: \(.Status)\n\(.Output)"'

          # Check if canary failed
          CANARY_INVOCATION_STATUS=$(echo "$CANARY_INVOCATION" | jq -r '.Status')
          if [[ "$CANARY_INVOCATION_STATUS" != "Success" ]]; then
            echo ""
            echo "::error::Canary deployment failed! Stopping rollout to protect remaining instances."
            exit 1
          fi

          echo ""
          echo "Canary deployment successful!"

          # Deploy to remaining instances (if any)
          if [[ $TOTAL -gt 1 ]]; then
            REMAINING=("${INSTANCES[@]:1}")
            REMAINING_IDS=$(IFS=' '; echo "${REMAINING[*]}")

            echo ""
            echo "=== Deploying to remaining $((TOTAL - 1)) instance(s): $REMAINING_IDS ==="

            REMAINING_COMMAND_ID=$(aws ssm send-command \
              --instance-ids $REMAINING_IDS \
              --document-name "AWS-RunShellScript" \
              --parameters "{\"commands\":[$(echo "$DEPLOY_SCRIPT" | jq -Rs .)]}" \
              --timeout-seconds 600 \
              --query 'Command.CommandId' \
              --output text)

            echo "Remaining instances SSM Command ID: $REMAINING_COMMAND_ID"
            echo "Waiting for deployment to complete on remaining instances..."

            # Wait for remaining command to complete
            for i in {1..60}; do
              REMAINING_STATUS=$(aws ssm list-commands --command-id "$REMAINING_COMMAND_ID" --query 'Commands[0].Status' --output text)
              echo "Command status: $REMAINING_STATUS"
              if [[ "$REMAINING_STATUS" == "Success" || "$REMAINING_STATUS" == "Failed" || "$REMAINING_STATUS" == "Cancelled" ]]; then
                break
              fi
              sleep 10
            done

            # Get results from remaining instances
            echo ""
            echo "=== Remaining Instances Deployment Results ==="
            REMAINING_INVOCATIONS=$(aws ssm list-command-invocations \
              --command-id "$REMAINING_COMMAND_ID" \
              --details \
              --query 'CommandInvocations[].{Instance:InstanceId,Status:Status,Output:CommandPlugins[0].Output}' \
              --output json)

            echo "$REMAINING_INVOCATIONS" | jq -r '.[] | "Instance: \(.Instance) - Status: \(.Status)\n\(.Output)\n---"'

            # Check if any remaining instances failed
            FAILED=$(echo "$REMAINING_INVOCATIONS" | jq -r '[.[] | select(.Status != "Success")] | length')
            if [[ "$FAILED" -gt 0 ]]; then
              echo ""
              echo "::error::Deployment failed on $FAILED remaining instance(s)"
              exit 1
            fi
          fi

          echo ""
          echo "=== Deployment successful on all $TOTAL instance(s)! ==="

      - name: Summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ inputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Instances:** ${{ steps.ec2.outputs.instance_count }} (${{ steps.ec2.outputs.instance_ids }})" >> $GITHUB_STEP_SUMMARY
