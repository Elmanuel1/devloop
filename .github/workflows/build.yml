name: Build

on:
  push:
    branches: [main, staging]
    paths-ignore:
      - 'specs/**'
      - 'libs/openapi-precon/**'
      - 'terraform/**'
      - 'flyway/**'
      - '.github/workflows/**'
  pull_request:
    branches: [main, staging]
    paths-ignore:
      - 'specs/**'
      - 'libs/openapi-precon/**'
      - 'terraform/**'
      - 'flyway/**'
      - '.github/workflows/**'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - stage
          - prod
        default: stage

concurrency:
  group: build
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  AWS_REGION: us-west-2

jobs:
  determine-environment:
    runs-on: self-hosted
    outputs:
      environment: ${{ steps.env.outputs.environment }}
    steps:
      - name: Determine environment
        id: env
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "environment=${{ inputs.environment }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "environment=stage" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "environment=stage" >> $GITHUB_OUTPUT
          fi

  build:
    needs: determine-environment
    runs-on: self-hosted
    environment: ${{ needs.determine-environment.outputs.environment }}
    permissions:
      contents: write
      packages: write
      pull-requests: read
      id-token: write
    outputs:
      version: ${{ steps.version.outputs.version }}
      image_tag: ${{ steps.meta.outputs.tags }}
      java_changed: ${{ steps.should_build.outputs.java_changed }}
      environment: ${{ needs.determine-environment.outputs.environment }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: changes
        uses: dorny/paths-filter@v3
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            java:
              - '**/*.java'
              - '**/*.groovy'
              - '**/*.gradle'
              - 'Dockerfile'
              - 'docker-compose*.yml'

      - name: Set build flag
        id: should_build
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "java_changed=true" >> $GITHUB_OUTPUT
          else
            echo "java_changed=${{ steps.changes.outputs.java }}" >> $GITHUB_OUTPUT
          fi

      - name: Set up JDK 21
        if: steps.should_build.outputs.java_changed == 'true'
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Node.js
        if: steps.should_build.outputs.java_changed == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Gradle
        if: steps.should_build.outputs.java_changed == 'true'
        uses: gradle/actions/setup-gradle@v4
        with:
          build-scan-terms-of-use-url: "https://gradle.com/help/legal-terms-of-use"
          build-scan-terms-of-use-agree: "yes"

      - name: Determine version
        id: version
        if: steps.should_build.outputs.java_changed == 'true'
        run: |
          ENV="${{ needs.determine-environment.outputs.environment }}"
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${ENV}-${SHORT_SHA}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Build with Gradle
        if: steps.should_build.outputs.java_changed == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: ./gradlew build --build-cache --scan

      - name: Set up QEMU
        if: steps.should_build.outputs.java_changed == 'true'
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: steps.should_build.outputs.java_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS Credentials (OIDC)
        if: |
          steps.should_build.outputs.java_changed == 'true' &&
          github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::905418019159:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Assume Role in Target Account
        if: |
          steps.should_build.outputs.java_changed == 'true' &&
          github.event_name != 'pull_request'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/OrganizationAccountAccessRole
          aws-region: ${{ env.AWS_REGION }}
          role-chaining: true
          role-skip-session-tagging: true

      - name: Login to ECR
        if: |
          steps.should_build.outputs.java_changed == 'true' &&
          github.event_name != 'pull_request'
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Extract metadata for Docker
        if: steps.should_build.outputs.java_changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ vars.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/tosspaper-${{ needs.determine-environment.outputs.environment }}
          tags: |
            type=raw,value=${{ steps.version.outputs.version }}

      - name: Build and push Docker image
        if: steps.should_build.outputs.java_changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          push: false
          load: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Push Docker image
        if: |
          steps.should_build.outputs.java_changed == 'true' &&
          github.event_name != 'pull_request'
        env:
          ECR_REGISTRY: ${{ vars.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_NAME: tosspaper-${{ needs.determine-environment.outputs.environment }}
        run: docker push ${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}

      - name: Summary
        if: steps.should_build.outputs.java_changed == 'true'
        env:
          ECR_REGISTRY: ${{ vars.ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          IMAGE_NAME: tosspaper-${{ needs.determine-environment.outputs.environment }}
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ needs.determine-environment.outputs.environment }}" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** \`${{ env.ECR_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY

      - name: Skip summary
        if: steps.should_build.outputs.java_changed != 'true'
        run: |
          echo "## Build Skipped" >> $GITHUB_STEP_SUMMARY
          echo "No Java/Gradle/Docker changes detected - build skipped" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build
    if: |
      github.event_name != 'pull_request' &&
      needs.build.outputs.java_changed == 'true'
    permissions:
      id-token: write
      contents: read
      packages: read
    uses: ./.github/workflows/deploy.yml
    with:
      environment: ${{ needs.build.outputs.environment }}
      version: ${{ needs.build.outputs.version }}
    secrets: inherit
