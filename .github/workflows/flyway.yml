# =============================================================================
# Flyway Database Migrations
# =============================================================================
#
# HOW TO USE THIS WORKFLOW
# ------------------------
#
# 1. AUTOMATIC (Pull Requests)
#    - Local: Tests migrations against ephemeral PostgreSQL
#    - SSM: Runs `flyway info` against stage to validate connection
#
# 2. MANUAL (Apply to Stage/Prod)
#    Go to: Actions → Flyway Migrations → Run workflow
#
#    Select your options:
#    ┌─────────────┬─────────────────────────────────────────────────────────┐
#    │ action      │ info = show status, validate = check, migrate = apply   │
#    │ environment │ stage or prod                                           │
#    └─────────────┴─────────────────────────────────────────────────────────┘
#
# ARCHITECTURE
# ------------
#    GitHub Actions (OIDC) → SSM Run Command → EC2 → RDS
#
#    RDS is in private subnets, not reachable from GitHub runners.
#    We use SSM to execute Flyway on EC2 instances that have RDS access.
#
# =============================================================================

name: Flyway Migrations

on:
  pull_request:
    branches: [main]
    paths:
      - 'flyway/**'
      - '.github/workflows/flyway.yml'
  workflow_dispatch:
    inputs:
      action:
        description: 'Flyway action'
        type: choice
        required: true
        options:
          - info
          - validate
          - migrate
          - repair
      environment:
        description: 'Target environment'
        type: choice
        required: true
        default: 'stage'
        options:
          - stage
          - prod
      flyway-flags:
        description: 'Optional Flyway CLI flags, e.g. -outOfOrder=true'
        type: string
        default: ''

permissions:
  id-token: write
  contents: read
  pull-requests: read

env:
  AWS_REGION: "us-west-2"
  FLYWAY_VERSION: "10.20.0"

jobs:
  # ===========================================================================
  # PR Validation - test migrations against ephemeral PostgreSQL
  # ===========================================================================
  pr-validate-local:
    if: github.event_name == 'pull_request'
    runs-on: self-hosted
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: tosspaper
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Detect changed paths
        uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            flyway_migrations:
              - 'flyway/**'
            jooq_version:
              - 'libs/flyway-jooq-classes/gradle.properties'

      - name: Require flyway-jooq-classes version bump
        if: steps.changes.outputs.flyway_migrations == 'true' && steps.changes.outputs.jooq_version != 'true'
        run: |
          echo "::error::Flyway migrations changed but libs/flyway-jooq-classes/gradle.properties was not updated. Bump moduleVersion before merging."
          exit 1

      - name: Validate CHANGELOG entry
        if: steps.changes.outputs.flyway_migrations == 'true'
        run: |
          VERSION=$(grep '^moduleVersion=' libs/flyway-jooq-classes/gradle.properties | cut -d'=' -f2)
          if ! grep -q "## \[$VERSION\]" libs/flyway-jooq-classes/CHANGELOG.md; then
            echo "::error::CHANGELOG.md missing entry for version $VERSION"
            exit 1
          fi
          echo "flyway-jooq-classes version $VERSION has CHANGELOG entry"

      - name: Run Flyway Migrate (local)
        uses: docker://flyway/flyway:10.20.0  # Keep in sync with FLYWAY_VERSION
        with:
          args: >-
            -url=jdbc:postgresql://postgres:5432/tosspaper
            -user=postgres
            -password=postgres
            -locations=filesystem:./flyway
            migrate ${{ inputs.flyway-flags }}

  # ===========================================================================
  # SSM - run Flyway on EC2 (has RDS access)
  # Manual only - PRs validate locally, never touch S3 or stage DB
  # ===========================================================================
  ssm:
    if: github.event_name == 'workflow_dispatch'
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    concurrency:
      group: flyway-${{ inputs.environment }}
      cancel-in-progress: false
    env:
      FLYWAY_ACTION: ${{ inputs.action }}
      TARGET_ENV: ${{ inputs.environment }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::905418019159:role/GitHubActionsRole
          aws-region: ${{ env.AWS_REGION }}

      - name: Assume Role in Target Account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.ACCOUNT_ID }}:role/OrganizationAccountAccessRole
          aws-region: ${{ env.AWS_REGION }}
          role-chaining: true
          role-skip-session-tagging: true

      - name: Ensure AWS CLI
        run: |
          if ! command -v aws &> /dev/null; then
            echo "AWS CLI not found, installing..."
            ARCH=$(uname -m)
            if [[ "$ARCH" == "aarch64" ]]; then
              URL="https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip"
            else
              URL="https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip"
            fi
            curl -fsSL "$URL" -o /tmp/awscliv2.zip
            unzip -qo /tmp/awscliv2.zip -d /tmp
            sudo /tmp/aws/install --update
            rm -rf /tmp/aws /tmp/awscliv2.zip
          fi
          aws --version

      - name: Get EC2 Instance ID
        id: ec2
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Environment,Values=${{ env.TARGET_ENV }}" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[0].Instances[0].InstanceId' \
            --output text)

          if [[ "$INSTANCE_ID" == "None" || -z "$INSTANCE_ID" ]]; then
            echo "::error::No running EC2 instance found for ${{ env.TARGET_ENV }}"
            exit 1
          fi

          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Found EC2 instance: $INSTANCE_ID"

      - name: Upload Flyway migrations to S3
        run: |
          aws s3 sync flyway/ s3://tosspaper-email-attachments-${{ env.TARGET_ENV }}/flyway/ \
            --delete \
            --exclude "*.md"
          echo "Uploaded migrations to S3"

      - name: Get DB credentials
        id: db
        run: |
          SECRET=$(aws secretsmanager get-secret-value \
            --secret-id "tosspaper-${{ env.TARGET_ENV }}/database/credentials" \
            --query 'SecretString' \
            --output text)

          # Mask credentials in logs
          JDBC_URL=$(echo $SECRET | jq -r '.jdbc_url')
          DB_USER=$(echo $SECRET | jq -r '.username')
          DB_PASS=$(echo $SECRET | jq -r '.password')

          # Base64 encode password to avoid shell escaping issues with special chars
          DB_PASS_B64=$(echo -n "$DB_PASS" | base64)

          echo "::add-mask::$DB_PASS"
          echo "::add-mask::$DB_PASS_B64"
          echo "jdbc_url=$JDBC_URL" >> $GITHUB_OUTPUT
          echo "username=$DB_USER" >> $GITHUB_OUTPUT
          echo "password_b64=$DB_PASS_B64" >> $GITHUB_OUTPUT

      - name: Run Flyway ${{ env.FLYWAY_ACTION }} via SSM
        run: |
          INSTANCE_ID="${{ steps.ec2.outputs.instance_id }}"

          # Build script with variables embedded (SSM runs each command in separate shell)
          # DB credentials fetched by GitHub Actions, not EC2
          # Using Docker to run Flyway (has ARM64 support, avoids Java installation issues)
          # Password is base64 encoded to avoid shell escaping issues with special chars
          FLYWAY_SCRIPT=$(cat <<SCRIPT
          set -e

          # Download migrations from S3 (clean first to remove stale files)
          rm -rf /tmp/flyway
          mkdir -p /tmp/flyway
          aws s3 sync s3://tosspaper-email-attachments-${{ env.TARGET_ENV }}/flyway/ /tmp/flyway/ --delete

          # Decode password (base64 encoded to avoid shell escaping issues)
          DB_PASSWORD=\$(echo "${{ steps.db.outputs.password_b64 }}" | base64 -d)

          # Write Flyway config file (using echo to avoid YAML parsing issues)
          echo "flyway.url=${{ steps.db.outputs.jdbc_url }}" > /tmp/flyway.conf
          echo "flyway.user=${{ steps.db.outputs.username }}" >> /tmp/flyway.conf
          echo "flyway.password=\$DB_PASSWORD" >> /tmp/flyway.conf
          echo "flyway.connectRetries=3" >> /tmp/flyway.conf

          # Run Flyway via Docker (multi-arch image with ARM64 support)
          echo "Running Flyway ${{ env.FLYWAY_ACTION }} via Docker..."
          docker run --rm \
            -v /tmp/flyway:/flyway/sql:ro \
            -v /tmp/flyway.conf:/flyway/conf/flyway.conf:ro \
            flyway/flyway:${{ env.FLYWAY_VERSION }} \
            ${{ env.FLYWAY_ACTION }} ${{ inputs.flyway-flags }}

          # Cleanup config file
          rm -f /tmp/flyway.conf

          echo "Flyway ${{ env.FLYWAY_ACTION }} completed successfully"
          SCRIPT
          )

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "{\"commands\":[$(echo "$FLYWAY_SCRIPT" | jq -Rs .)]}" \
            --timeout-seconds 300 \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM Command ID: $COMMAND_ID"

          echo "Waiting for command to complete..."
          aws ssm wait command-executed \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" || true

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$INSTANCE_ID" \
            --query '[Status, StandardOutputContent, StandardErrorContent]' \
            --output json)

          STATUS=$(echo $OUTPUT | jq -r '.[0]')
          STDOUT=$(echo $OUTPUT | jq -r '.[1]')
          STDERR=$(echo $OUTPUT | jq -r '.[2]')

          echo "=== Command Output ==="
          echo "$STDOUT"

          if [[ -n "$STDERR" && "$STDERR" != "null" ]]; then
            echo "=== Errors ==="
            echo "$STDERR"
          fi

          # Write to Job Summary (visible in GitHub Actions summary view)
          echo "## Flyway ${{ env.FLYWAY_ACTION }} - ${{ env.TARGET_ENV }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [[ "$STATUS" != "Success" ]]; then
            echo "### ❌ Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$STDOUT" >> $GITHUB_STEP_SUMMARY
            if [[ -n "$STDERR" && "$STDERR" != "null" ]]; then
              echo "$STDERR" >> $GITHUB_STEP_SUMMARY
            fi
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "::error::SSM command failed with status: $STATUS"
            exit 1
          else
            echo "### ✅ Success" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "$STDOUT" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          fi

          echo "Flyway ${{ env.FLYWAY_ACTION }} completed successfully"

      - name: Trigger jOOQ class generation
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GHCR_TOKEN }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'publish-modules.yml',
              ref: context.payload.pull_request?.head?.ref || context.ref.replace('refs/heads/', ''),
              inputs: {
                module: 'flyway-jooq-classes',
                publish: String(
                  '${{ env.FLYWAY_ACTION }}' === 'migrate' &&
                  '${{ env.TARGET_ENV }}' === 'prod'
                )
              }
            })
