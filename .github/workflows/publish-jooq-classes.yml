name: jOOQ Classes

on:
  workflow_dispatch:
    inputs:
      publish:
        description: 'Publish to GitHub Packages'
        type: boolean
        default: false

concurrency:
  group: jooq-classes-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '21'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate module version
        uses: ./.github/actions/validate-module-version
        with:
          module-path: libs/flyway-jooq-classes

  build:
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build jOOQ classes
        run: ./gradlew :libs:flyway-jooq-classes:build --no-configuration-cache

      - name: Publish to GitHub Packages
        if: >-
          (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
          (github.event_name == 'workflow_dispatch' && inputs.publish)
        env:
          GITHUB_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: ./gradlew :libs:flyway-jooq-classes:publish --no-configuration-cache
