services:
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    env_file:
      - ./springboot_local.env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tosspaper-redis
    env_file:
      - ./springboot_local.env
    command: redis-server --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:?REDIS_PASSWORD is required}", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    container_name: tosspaper-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3,ssm,secretsmanager
      - DEBUG=0
      - PERSISTENCE=1
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - EXTRA_CORS_ALLOWED_HEADERS=*
      - EXTRA_CORS_EXPOSE_HEADERS=ETag,x-amz-meta-custom-header
    volumes:
      - localstack_data:/var/lib/localstack
      - ./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
      - ./secrets/local-secrets.json:/etc/localstack/secrets/local-secrets.json:ro
      - ./secrets/local-config.json:/etc/localstack/secrets/local-config.json:ro
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  flyway:
    image: flyway/flyway:10
    container_name: tosspaper-flyway
    env_file:
      - ./springboot_local.env
    command: -url=jdbc:postgresql://postgres:5432/${POSTGRES_DB} -user=${POSTGRES_USER} -password=${POSTGRES_PASSWORD} -connectRetries=5 migrate
    volumes:
      - ./flyway:/flyway/sql
    networks:
      - tosspaper-network
    depends_on:
      postgres:
        condition: service_healthy

  temporal:
    image: temporalio/auto-setup:${TEMPORAL_VERSION}
    container_name: tosspaper-temporal
    env_file:
      - ./springboot_local.env
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=${TEMPORAL_DB_PORT}
      - POSTGRES_USER=${TEMPORAL_DB_USER}
      - POSTGRES_PWD=${TEMPORAL_DB_PASSWORD}
      - POSTGRES_SEEDS=${TEMPORAL_DB_HOST}
      - DYNAMIC_CONFIG_FILE_PATH=config/dynamicconfig/dynamicconfig.yaml
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CLI_ADDRESS=temporal:7233
    volumes:
      - ./temporal/dynamicconfig:/etc/temporal/config/dynamicconfig
    networks:
      - tosspaper-network
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

  temporal-ui:
    image: temporalio/ui:${TEMPORAL_UI_VERSION}
    container_name: tosspaper-temporal-ui
    env_file:
      - ./springboot_local.env
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - tosspaper-network
    depends_on:
      - temporal

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  localstack_data:
    driver: local

networks:
  tosspaper-network:
    driver: bridge
