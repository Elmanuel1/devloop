services:
  postgres:
    image: pgvector/pgvector:pg16
    hostname: postgres
    environment:
      POSTGRES_DB: tosspaper
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      #- ./init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 60s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: tosspaper-redis
    environment:
      REDIS_PASSWORD: mypass
    command: redis-server --requirepass mypass
    ports:
      - "6379:6379"
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "mypass", "ping"]
      interval: 20s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3.0
    container_name: tosspaper-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs,s3
      - DEBUG=0
      - PERSISTENCE=1
      - EXTRA_CORS_ALLOWED_ORIGINS=http://localhost:3000
      - EXTRA_CORS_ALLOWED_HEADERS=*
      - EXTRA_CORS_EXPOSE_HEADERS=ETag,x-amz-meta-custom-header
    volumes:
      - localstack-data:/var/lib/localstack
      - ./localstack/init-aws.sh:/etc/localstack/init/ready.d/init-aws.sh
    networks:
      - tosspaper-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4566/_localstack/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  temporal:
    image: temporalio/auto-setup:1.22
    container_name: tosspaper-temporal
    ports:
      - "7233:7233"
    environment:
      - DB=postgresql
      - DB_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PWD=postgres
      - POSTGRES_SEEDS=postgres
    networks:
      - tosspaper-network
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.21.3
    container_name: tosspaper-temporal-ui
    ports:
      - "8088:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
    networks:
      - tosspaper-network
    depends_on:
      - temporal

  flyway:
    image: flyway/flyway:11-alpine
    platform: linux/arm64
    container_name: tosspaper-flyway
    command: -url=jdbc:postgresql://postgres:5432/tosspaper -user=postgres -password=postgres -locations=filesystem:/flyway/sql -baselineOnMigrate=true -baselineVersion=0 -connectRetries=60 migrate
    volumes:
      - ./flyway:/flyway/sql
    networks:
      - tosspaper-network
    depends_on:
      postgres:
        condition: service_healthy
  

